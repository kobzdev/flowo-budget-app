<script>
const { useState, useEffect, useRef } = React;

// ── GEMINI AI ─────────────────────────────────────
async function askGemini(prompt) {
  try {
    const res = await fetch("/api/gemini", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ prompt }),
    });

    const data = await res.json();
    return data.reply || "No response";
  } catch {
    return "Error connecting to AI";
  }
}

// ── CREDENTIALS ───────────────────────────────────────────────────
const SUPA_URL = 'https://zgljrbxvcwpxsllejauz.supabase.co';
const SUPA_KEY = 'sb_publishable_wRgbnh9IKH04VYCOlP2cxQ_HYxje0oh';

// ── SUPABASE CLIENT ───────────────────────────────────────────────
const supa = {
  signUp: async (email, password) => {
    const r = await fetch(`${SUPA_URL}/auth/v1/signup`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', apikey: SUPA_KEY },
      body: JSON.stringify({ email, password })
    });
    return r.json();
  },
  signIn: async (email, password) => {
    const r = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', apikey: SUPA_KEY },
      body: JSON.stringify({ email, password })
    });
    return r.json();
  },
  signOut: async (token) => {
    try { await fetch(`${SUPA_URL}/auth/v1/logout`, { method: 'POST', headers: { apikey: SUPA_KEY, Authorization: `Bearer ${token}` } }); } catch {}
  },
  getUser: async (token) => {
    const r = await fetch(`${SUPA_URL}/auth/v1/user`, { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${token}` } });
    return r.json();
  },
  select: async (table, token) => {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?select=*&order=created_at.desc`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }
    });
    if (!r.ok) return null;
    return r.json();
  },
  insert: async (table, data, token) => {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify(data)
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'Insert failed'); }
    const rows = await r.json();
    return rows[0];
  },
  delete: async (table, id, token) => {
    await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE', headers: { apikey: SUPA_KEY, Authorization: `Bearer ${token}` }
    });
  },
  upsertProfile: async (userId, paydays, token) => {
    await fetch(`${SUPA_URL}/rest/v1/profiles`, {
      method: 'POST',
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates' },
      body: JSON.stringify({ id: userId, paydays })
    });
  },
  getProfile: async (userId, token) => {
    const r = await fetch(`${SUPA_URL}/rest/v1/profiles?id=eq.${userId}&select=*`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${token}` }
    });
    if (!r.ok) return null;
    const rows = await r.json();
    return rows[0] || null;
  }
};

// ── SESSION MANAGER ───────────────────────────────────────────────
const session = {
  save: (token, user, expiresIn = 3600) => {
    localStorage.setItem('flowo_token', token);
    localStorage.setItem('flowo_user', JSON.stringify(user));
    localStorage.setItem('flowo_expires', String(Date.now() + expiresIn * 1000));
  },
  load: () => ({
    token: localStorage.getItem('flowo_token'),
    user: (() => { try { return JSON.parse(localStorage.getItem('flowo_user')); } catch { return null; } })(),
    expires: parseInt(localStorage.getItem('flowo_expires') || '0')
  }),
  isExpired: () => {
    const exp = parseInt(localStorage.getItem('flowo_expires') || '0');
    return exp > 0 && Date.now() > exp;
  },
  clearToken: () => { localStorage.removeItem('flowo_token'); localStorage.removeItem('flowo_expires'); },
  clearAll: () => { ['flowo_token','flowo_user','flowo_expires'].forEach(k => localStorage.removeItem(k)); }
};

// ── LOCAL CACHE — persists data per user ─────────────────────────
const cache = {
  key: uid => `flowo_data_${uid}`,
  save: (uid, data) => { try { localStorage.setItem(cache.key(uid), JSON.stringify(data)); } catch {} },
  load: uid => { try { const r = localStorage.getItem(cache.key(uid)); return r ? JSON.parse(r) : null; } catch { return null; } },
  addRow: (uid, table, row) => {
    const c = cache.load(uid) || {};
    c[table] = [row, ...(c[table] || [])];
    try { localStorage.setItem(cache.key(uid), JSON.stringify(c)); } catch {}
  },
  delRow: (uid, table, id) => {
    const c = cache.load(uid) || {};
    c[table] = (c[table] || []).filter(r => r.id !== id);
    try { localStorage.setItem(cache.key(uid), JSON.stringify(c)); } catch {}
  }
};

// ── HELPERS ───────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(n || 0);
const fmtD = d => new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
const todayStr = () => new Date().toISOString().split('T')[0];

const CAT = {
  Food:          { e: '🍔', bg: 'rgba(251,191,36,.12)',  c: '#fbbf24' },
  Transport:     { e: '🚗', bg: 'rgba(56,189,248,.12)',  c: '#38bdf8' },

  Health:        { e: '💊', bg: 'rgba(110,231,183,.12)', c: '#6ee7b7' },

  Other:         { e: '📦', bg: 'rgba(148,163,184,.12)', c: '#94a3b8' }
};
const CATS = Object.keys(CAT);

function nextPayday(paydays) {
  if (!paydays || !paydays.length) return { days: 0, date: null };
  const now = new Date(), m = now.getMonth(), y = now.getFullYear();
  let best = null, bd = 9999;
  for (const pd of paydays) {
    let d = new Date(y, m, pd);
    if (d <= now) d = new Date(y, m + 1, pd);
    const diff = Math.ceil((d - now) / 864e5);
    if (diff < bd) { bd = diff; best = d; }
  }
  return { days: bd, date: best };
}

// ── SESSION EXPIRED OVERLAY ───────────────────────────────────────
function SessionExpiredBanner({ cachedUser, onRelogin }) {
  const [em, setEm] = useState(cachedUser?.email || '');
  const [pw, setPw] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const go = async () => {
    if (!pw) { setErr('Please enter your password.'); return; }
    setLoading(true); setErr('');
    try {
      const d = await supa.signIn(em, pw);
      if (d.access_token) {
        session.save(d.access_token, d.user || cachedUser, d.expires_in);
        onRelogin(d.access_token, d.user || cachedUser);
      } else {

function AuthScreen({ onAuth }) {
  const [tab, setTab] = useState('login');
  const [em, setEm] = useState('');
  const [pw, setPw] = useState('');
  const [pw2, setPw2] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [ok, setOk] = useState('');

  const switchTab = t => { setTab(t); setErr(''); setOk(''); };

  const validate = () => {
    if (!em.trim()) return 'Please enter your email address.';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em.trim())) return 'Please enter a valid email address.';
    if (!pw) return 'Please enter your password.';
    if (pw.length < 6) return 'Password must be at least 6 characters.';
    if (tab === 'signup' && pw !== pw2) return 'Passwords do not match.';
    return null;
  };

  const go = async () => {
    const vErr = validate();
    if (vErr) { setErr(vErr); return; }
    setLoading(true); setErr(''); setOk('');
    try {
      if (tab === 'signup') {
        const d = await supa.signUp(em.trim(), pw);
        if (d.error || d.msg) {
          const msg = (d.error_description || d.msg || '').toLowerCase();
          if (msg.includes('already registered')) setErr('This email is already registered. Please sign in.');
          else setErr(d.error_description || d.msg || 'Sign up failed.');
        } else if (d.access_token) {
          session.save(d.access_token, d.user, d.expires_in);
          onAuth(d.access_token, d.user);
        } else if (d.id) {
          setOk('✅ Account created! Check your email to confirm it, then sign in.');
          switchTab('login');
        } else {
          setErr('Unexpected response. Please try again.');
        }
      } else {
        const d = await supa.signIn(em.trim(), pw);
        if (d.error || d.error_description) {
          const msg = (d.error_description || d.error || '').toLowerCase();
          if (msg.includes('invalid login') || msg.includes('invalid credentials') || msg.includes('wrong')) {
            setErr('Incorrect email or password. Please try again.');
          } else if (msg.includes('email not confirmed')) {
            setErr('Please confirm your email first. Check your inbox.');
          } else if (msg.includes('user not found')) {
            setErr('No account with this email. Please sign up first.');
          } else {
            setErr(d.error_description || d.error || 'Sign in failed.');
          }
        } else if (d.access_token) {
          session.save(d.access_token, d.user, d.expires_in);
          onAuth(d.access_token, d.user);

function App() {
  // authState: 'loading' | 'authed' | 'expired' | 'guest'
  const [authState, setAuthState] = useState('loading');
  const [user, setUser]   = useState(null);
  const [token, setToken] = useState(null);
  const [tab, setTab]     = useState('dashboard');
  const [showAdd, setShowAdd] = useState(false);
  const [offline, setOffline] = useState(!navigator.onLine);
  const [usingCache, setUsingCache] = useState(false);
  const [data, setData]   = useState({ income: [], expenses: [], planned: [], paydays: [] });

  useEffect(() => {
    const on=()=>setOffline(false), off=()=>setOffline(true);
    window.addEventListener('online',on); window.addEventListener('offline',off);
    return ()=>{ window.removeEventListener('online',on); window.removeEventListener('offline',off); };
  }, []);

  // ── Boot ──
  useEffect(() => {
    const init = async () => {
      const { token: tok, user: usr } = session.load();
      if (!tok || !usr) { setAuthState('guest'); return; }

      // Load cached data immediately so screen isn't blank
      const cached = cache.load(usr.id);
      if (cached) {
        setData({ income: cached.income||[], expenses: cached.expenses||[], planned: cached.planned||[], paydays: cached.paydays||[] });
        setUsingCache(true);
      }

      // Session token is expired
      if (session.isExpired()) {
        setUser(usr);
        setAuthState('expired');
        return;
      }

      // Try to verify token and refresh data from cloud
      try {
        const u = await supa.getUser(tok);
        if (u.id) {
          setUser(u); setToken(tok);
          await loadData(tok, u.id);
          setAuthState('authed');
        } else {
          // Token rejected by Supabase
          session.clearToken();
          setUser(usr);
          setAuthState('expired');
        }
      } catch {
        // Network failure — stay on cached data with active session
        if (tok) {
          setUser(usr); setToken(tok);
          setAuthState('authed');
        } else {
          setUser(usr);
          setAuthState('expired');
        }
      }
    };
    init();
  }, []);

  // ── Load from Supabase, update cache ──
  const loadData = async (tok, uid) => {
    try {
      const [income, expenses, planned, profile] = await Promise.all([
        supa.select('income', tok),
        supa.select('expenses', tok),
        supa.select('planned', tok),
        supa.getProfile(uid, tok)
      ]);
      // null = 401 (token rejected)
      if (income === null) { session.clearToken(); setAuthState('expired'); return; }
      const newData = {
        income:   Array.isArray(income)   ? income   : [],
        expenses: Array.isArray(expenses) ? expenses : [],
        planned:  Array.isArray(planned)  ? planned  : [],
        paydays:  profile?.paydays || []
      };
      setData(newData);
      setUsingCache(false);
      cache.save(uid, newData);
    } catch(e) {
      console.error('loadData error', e);
      // Keep whatever is already in state (cache was already loaded)
      setUsingCache(true);
    }
  };

  const onAuth = async (tok, u) => {
    setToken(tok); setUser(u); setUsingCache(false);
    await loadData(tok, u.id);
    setAuthState('authed');
  };

  const onRelogin = async (tok, u) => {
    setToken(tok); setUser(u); setUsingCache(false);
    await loadData(tok, u.id);
    setAuthState('authed');
  };

  const logout = async () => {
    try { await supa.signOut(token); } catch {}
    session.clearAll();
    setUser(null); setToken(null);
    setData({ income: [], expenses: [], planned: [], paydays: [] });
    setUsingCache(false);
    setAuthState('guest');
  };

  // ── CRUD — write to Supabase + update cache ──
  const addItem = async (table, item) => {
    const row = await supa.insert(table, { ...item, user_id: user.id }, token);
    if (row) {
      setData(d => {
        const updated = { ...d, [table]: [row, ...d[table]] };
        cache.save(user.id, updated);
        return updated;
      });
    } else {
      await loadData(token, user.id);
    }
  };

  const delItem = async (table, id) => {
    await supa.delete(table, id, token);
    setData(d => {
      const updated = { ...d, [table]: d[table].filter(i => i.id !== id) };
      cache.save(user.id, updated);
      return updated;
    });
  };

  const updPaydays = async (pds) => {
    setData(d => {
      const updated = { ...d, paydays: pds };
      cache.save(user.id, updated);
      return updated;
    });
    try { await supa.upsertProfile(user.id, pds, token); } catch(e) { console.error('paydays error', e); }
  };

  // ── Screens ──
  if (authState === 'loading') {
    return React.createElement('div', { className: 'loading-screen' },
      React.createElement('div', { className: 'loading-logo' }, 'Flow', React.createElement('span', null, 'o')),
      React.createElement('div', { className: 'loading-dot' },
        React.createElement('div', { className: 'dot', style: { background: 'var(--acc)' } }),
        React.createElement('div', { className: 'dot', style: { background: 'var(--acc)', animationDelay: '.2s' } }),
        React.createElement('div', { className: 'dot', style: { background: 'var(--acc)', animationDelay: '.4s' } })
      )
    );
  }

  if (authState === 'guest') return React.createElement(AuthScreen, { onAuth });

  const navItems = [
    { id: 'dashboard', label: 'Home' },
    { id: 'planner',   label: 'Planner' },
    { id: 'add',       label: '' },
    { id: 'ai',        label: 'Ask AI' },
    { id: 'profile',   label: 'Profile' }
  ];

  return React.createElement('div', { className: 'shell' },
    // Session expired modal sits on top of the app (data still visible behind it)
    authState === 'expired' && React.createElement(SessionExpiredBanner, { cachedUser: user, onRelogin }),
    offline    && React.createElement('div', { className: 'offbanner' }, '⚡ Offline — changes may not save until reconnected'),
    usingCache && !offline && React.createElement('div', { className: 'cachebanner' }, '📦 Showing cached data — tap Sync & Refresh to update'),
    React.createElement('div', { className: 'page' },
      tab === 'dashboard' && React.createElement(Dashboard, { data }),
      tab === 'planner'   && React.createElement(Planner,   { data, onDel: delItem }),
      tab === 'ai'        && React.createElement(AIChat,    { data }),
      tab === 'profile'   && React.createElement(Profile,   { user, onLogout: logout, data, onPaydays: updPaydays })
    ),
    React.createElement('nav', { className: 'nav' },
      navItems.map(item => {
        if (item.id === 'add') return React.createElement('button', { key: 'add', className: 'ni nadd', onClick: () => setShowAdd(true) },
          React.createElement('svg', { viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2.5, strokeLinecap: 'round', width: 24, height: 24 },
            React.createElement('line', { x1: 12, y1: 5, x2: 12, y2: 19 }),
            React.createElement('line', { x1: 5, y1: 12, x2: 19, y2: 12 })
          )
        );
        return React.createElement('button', { key: item.id, className: 'ni '+(tab===item.id?'on':''), onClick: () => setTab(item.id) },
          React.createElement('svg', { viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.8, strokeLinecap: 'round', strokeLinejoin: 'round' },
            item.id === 'dashboard'
              ? React.createElement('g',null,React.createElement('rect',{x:3,y:3,width:7,height:7}),React.createElement('rect',{x:14,y:3,width:7,height:7}),React.createElement('rect',{x:14,y:14,width:7,height:7}),React.createElement('rect',{x:3,y:14,width:7,height:7}))
              : item.id === 'planner'
                ? React.createElement('g',null,React.createElement('rect',{x:3,y:4,width:18,height:18,rx:2}),React.createElement('line',{x1:16,y1:2,x2:16,y2:6}),React.createElement('line',{x1:8,y1:2,x2:8,y2:6}),React.createElement('line',{x1:3,y1:10,x2:21,y2:10}))
                : item.id === 'profile'
                  ? React.createElement('g',null,React.createElement('circle',{cx:12,cy:8,r:4}),React.createElement('path',{d:'M4 20c0-4 3.6-7 8-7s8 3 8 7'}))
                  : React.createElement('g',null,React.createElement('circle',{cx:12,cy:10,r:5}),React.createElement('path',{d:'M9 22h6M12 15v7'}))
          ),
          React.createElement('span', { className: 'nl' }, item.label)
        );
      })
    ),
    showAdd && React.createElement(AddModal, { onClose: () => setShowAdd(false), onAdd: addItem })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
