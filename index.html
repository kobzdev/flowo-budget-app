// ── RESET PASSWORD SCREEN ────────────────────────────────────────
// Shown when user arrives from the password reset email link
function ResetPasswordScreen({ accessToken, onDone }) {
  const [pw, setPw]   = useState('');
  const [pw2, setPw2] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [done, setDone] = useState(false);

  const submit = async () => {
    if (!pw) { setErr('Please enter a new password.'); return; }
    if (pw.length < 6) { setErr('Password must be at least 6 characters.'); return; }
    if (pw !== pw2) { setErr('Passwords do not match.'); return; }
    setLoading(true); setErr('');
    const result = await supa.updatePassword(pw, accessToken);
    setLoading(false);
    if (result.ok) {
      setDone(true);
    } else {
      const msg = (result.data?.message || result.data?.error_description || '').toLowerCase();
      if (msg.includes('expired') || msg.includes('invalid')) {
        setErr('This reset link has expired. Please request a new one from the Sign In page.');
      } else {
        setErr(result.data?.message || 'Failed to update password. Please try again.');
      }
    }
  };

  // Success screen
  if (done) {
    return e('div', { className:'auth-wrap' },
      e('div', { className:'logo' }, 'My', e('span', null, 'Budget')),
      e('div', { className:'auth-card', style:{textAlign:'center'} },
        e('div', { style:{fontSize:52,marginBottom:16} }, '🎉'),
        e('div', { style:{fontFamily:'Syne,sans-serif',fontSize:22,fontWeight:700,marginBottom:10} }, 'Password Updated!'),
        e('div', { style:{fontSize:14,color:'var(--t2)',lineHeight:1.7,marginBottom:24} },
          'Your password has been changed successfully. You can now sign in with your new password.'
        ),
        e('button', { className:'btn', onClick:onDone }, 'Go to Sign In')
      )
    );
  }

  return e('div', { className:'auth-wrap' },
    e('div', { className:'logo' }, 'My', e('span', null, 'Budget')),
    e('div', { className:'tagline' }, 'Set a new password'),
    e('div', { className:'auth-card' },
      e('div', { style:{textAlign:'center',marginBottom:24} },
        e('div', { style:{fontSize:40,marginBottom:12} }, '🔒'),
        e('div', { style:{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:700,marginBottom:6} }, 'Create New Password'),
        e('div', { style:{fontSize:13,color:'var(--t2)',lineHeight:1.6} }, 'Choose a strong password for your MyBudget account.')
      ),
      err && e('div', { className:'err' }, err),
      e('div', { className:'fg' },
        e('label', { className:'lbl' }, 'New Password'),
        e('input', {
          className:'inp', type:'password', placeholder:'At least 6 characters',
          value:pw, onChange:ev=>setPw(ev.target.value),
          onKeyDown:ev=>ev.key==='Enter'&&submit(),
          autoFocus:true, autoComplete:'new-password'
        })
      ),
      e('div', { className:'fg' },
        e('label', { className:'lbl' }, 'Confirm New Password'),
        e('input', {
          className:'inp', type:'password', placeholder:'Repeat your password',
          value:pw2, onChange:ev=>setPw2(ev.target.value),
          onKeyDown:ev=>ev.key==='Enter'&&submit(),
          autoComplete:'new-password'
        })
      ),
      // Password strength hint
      pw.length > 0 && pw.length < 6 && e('div', {
        style:{fontSize:12,color:'var(--acc4)',marginTop:-8,marginBottom:10,paddingLeft:2}
      }, '⚠️ Too short — use at least 6 characters'),
      pw.length >= 6 && pw2.length > 0 && pw === pw2 && e('div', {
        style:{fontSize:12,color:'var(--acc)',marginTop:-8,marginBottom:10,paddingLeft:2}
      }, '✓ Passwords match'),
      pw.length >= 6 && pw2.length > 0 && pw !== pw2 && e('div', {
        style:{fontSize:12,color:'var(--red)',marginTop:-8,marginBottom:10,paddingLeft:2}
      }, '✕ Passwords do not match'),
      e('button', { className:'btn', onClick:submit, disabled:loading || pw.length < 6 || pw !== pw2 },
        loading ? e('span', null, e('span',{className:'spin'}), 'Updating…') : 'Set New Password'
      ),
      e('p', { style:{textAlign:'center',marginTop:14,fontSize:12,color:'var(--t3)'} },
        e('span', { style:{color:'var(--acc)',cursor:'pointer',fontWeight:600}, onClick:onDone }, '← Back to Sign In')
      )
    )
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────
function App() {
  const [authState, setAuthState] = useState('loading');
  const [user, setUser]           = useState(null);
  const [token, setToken]         = useState(null);
  const [tab, setTab]             = useState('dashboard');
  const [showAdd, setShowAdd]     = useState(false);
  const [offline, setOffline]     = useState(!navigator.onLine);
  const [usingCache, setUsingCache] = useState(false);
  const [darkMode, setDarkMode]   = useState(() => (prefs.g('theme')||'dark') === 'dark');
  const [data, setData]           = useState({ income:[], expenses:[], planned:[], paydays:[] });
  const [resetToken, setResetToken] = useState(null); // set when arriving from password reset email

  useEffect(() => { setTheme(darkMode?'dark':'light'); }, [darkMode]);

  useEffect(() => {
    const on=()=>setOffline(false), off=()=>setOffline(true);
    window.addEventListener('online',on); window.addEventListener('offline',off);
    return ()=>{ window.removeEventListener('online',on); window.removeEventListener('offline',off); };
  }, []);

  // ── Boot ──
  useEffect(() => {
    const init = async () => {
      // ── Detect password reset link (Supabase puts token in URL hash) ──
      // URL looks like: https://yourapp.com/#access_token=xxx&type=recovery
      const hash = window.location.hash;
      if (hash && hash.includes('type=recovery')) {
        const params = new URLSearchParams(hash.replace('#', ''));
        const accessToken = params.get('access_token');
        if (accessToken) {
          // Clear the hash from the URL so it's clean
          window.history.replaceState(null, '', window.location.pathname);
          setResetToken(accessToken);
          setAuthState('guest'); // show reset screen on top of guest state
          return;
        }
      }

      const { token:tok, user:usr } = session.load();
      if (!tok || !usr) { setAuthState('guest'); return; }
      const cached = cache.load(usr.id);
      if (cached) {
        setData({ income:cached.income||[], expenses:cached.expenses||[], planned:cached.planned||[], paydays:cached.paydays||[] });
        setUsingCache(true);
      }
      if (session.isExpired()) { setUser(usr); setAuthState('expired'); return; }
      try {
        const u = await supa.getUser(tok);
        if (u.id) {
          setUser(u); setToken(tok);
          await loadData(tok, u.id);
          setAuthState('authed');
        } else {
          session.clearToken(); setUser(usr); setAuthState('expired');
        }
      } catch {
        if (tok) { setUser(usr); setToken(tok); setAuthState('authed'); }
        else { setUser(usr); setAuthState('expired'); }
      }
    };
    init();
  }, []);

  const loadData = async (tok, uid) => {
    try {
      const [inc, exp, pln, profile] = await Promise.all([
        supa.select('income', tok, uid),
        supa.select('expenses', tok, uid),
        supa.select('planned', tok, uid),
        supa.getProfile(uid, tok)
      ]);
      if (inc === null) { session.clearToken(); setAuthState('expired'); return; }
      const newData = {
        income:   Array.isArray(inc)  ? inc  : [],
        expenses: Array.isArray(exp)  ? exp  : [],
        planned:  Array.isArray(pln)  ? pln  : [],
        paydays:  profile?.paydays || []
      };
      setData(newData); setUsingCache(false); cache.save(uid, newData);
    } catch { setUsingCache(true); }
  };

  const onAuth = async (tok, u) => {
    setToken(tok); setUser(u); setUsingCache(false);
    await loadData(tok, u.id);
    setAuthState('authed');
  };
  const onRelogin = async (tok, u) => {
    setToken(tok); setUser(u); setUsingCache(false);
    await loadData(tok, u.id);
    setAuthState('authed');
  };
  const logout = async () => {
    try { await supa.signOut(token); } catch {}
    session.clearAll();
    setUser(null); setToken(null);
    setData({ income:[], expenses:[], planned:[], paydays:[] });
    setUsingCache(false); setAuthState('guest');
  };

  const addItem = async (table, item) => {
    const row = await supa.insert(table, { ...item, user_id:user.id }, token);
    if (row) {
      setData(d => { const updated={...d,[table]:[row,...d[table]]}; cache.save(user.id,updated); return updated; });
    } else { await loadData(token, user.id); }
  };
  const delItem = async (table, id) => {
    await supa.delete(table, id, token);
    setData(d => { const updated={...d,[table]:d[table].filter(i=>i.id!==id)}; cache.save(user.id,updated); return updated; });
  };

  // Delete all transactions by type (called from Clear Transactions manager)
  const clearTransactions = async (types) => {
    const tableMap = { income:'income', expenses:'expenses', planned:'planned' };
    for (const type of types) {
      const table = tableMap[type];
      if (table) {
        await supa.deleteAll(table, user.id, token);
      }
    }
    // Refresh data
    setData(d => {
      const updated = { ...d };
      types.forEach(t => { updated[t] = []; });
      cache.save(user.id, updated);
      return updated;
    });
  };
  const updPaydays = async pds => {
    setData(d => { const updated={...d,paydays:pds}; cache.save(user.id,updated); return updated; });
    try { await supa.upsertProfile(user.id, { paydays:pds }, token); } catch(ex) { console.error(ex); }
  };

  // ── Loading screen ──
  if (authState === 'loading') {
    return e('div',{className:'loading-screen'},
      e('div',{className:'loading-logo'},'My',e('span',null,'Budget')),
      e('div',{className:'loading-dot'},
        [0,1,2].map(i=>e('div',{key:i,className:'dot',style:{background:'var(--acc)',animationDelay:i*.2+'s',width:10,height:10}}))
      )
    );
  }

  // ── Show password reset screen if arrived from reset email ──
  if (resetToken) {
    return e(ResetPasswordScreen, {
      accessToken: resetToken,
      onDone: () => { setResetToken(null); setAuthState('guest'); }
    });
  }

  if (authState === 'guest') return e(AuthScreen, { onAuth });

  // NAV ITEMS: Home | Planner | + | Goals | Log
  const navDefs = [
    { id:'dashboard', label:'Home',    icon: e('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'},e('rect',{x:3,y:3,width:7,height:7}),e('rect',{x:14,y:3,width:7,height:7}),e('rect',{x:14,y:14,width:7,height:7}),e('rect',{x:3,y:14,width:7,height:7})) },
    { id:'planner',   label:'Planner', icon: e('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'},e('rect',{x:3,y:4,width:18,height:18,rx:2}),e('line',{x1:16,y1:2,x2:16,y2:6}),e('line',{x1:8,y1:2,x2:8,y2:6}),e('line',{x1:3,y1:10,x2:21,y2:10})) },
    { id:'_add' },
    { id:'goals',     label:'Goals',   icon: e('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'},e('circle',{cx:12,cy:12,r:10}),e('circle',{cx:12,cy:12,r:6}),e('circle',{cx:12,cy:12,r:2})) },
    { id:'log',       label:'Log',     icon: e('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'},e('path',{d:'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'}),e('polyline',{points:'14 2 14 8 20 8'}),e('line',{x1:16,y1:13,x2:8,y2:13}),e('line',{x1:16,y1:17,x2:8,y2:17})) }
  ];

  const appShell = e('div', { className:'shell' },
    authState==='expired' && e(SessionExpiredBanner, {
      cachedUser:user,
      onRelogin,
      onSwitchAccount: () => {
        session.clearAll();
        setUser(null); setToken(null);
        setData({ income:[], expenses:[], planned:[], paydays:[] });
        setAuthState('guest');
      }
    }),
    offline     && e('div',{className:'offbanner'},'⚡ Offline — changes may not save until reconnected'),
    usingCache && !offline && e('div',{className:'cachebanner'},'📦 Showing cached data — tap Sync & Refresh to update'),
    e('div', { className:'page' },
      tab==='dashboard' && e(Dashboard, { data, onGoProfile:()=>setTab('profile') }),
      tab==='planner'   && e(Planner,   { data, onDel:delItem, onAdd:addItem }),
      tab==='goals'     && e(Goals,     { data }),
      tab==='log'       && e(LogHistory,{ data, onDel:delItem }),
      tab==='profile'   && e(Profile,   { user, onLogout:logout, data, onPaydays:updPaydays, darkMode, onToggleDark:()=>setDarkMode(p=>!p), onClearTransactions:clearTransactions, onDelItem:delItem })
    ),
    e('nav', { className:'nav' },
      navDefs.map(item => {
        if (item.id==='_add') return e('button',{key:'add',className:'ni nadd',onClick:()=>setShowAdd(true)},
          e('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round',width:22,height:22},e('line',{x1:12,y1:5,x2:12,y2:19}),e('line',{x1:5,y1:12,x2:19,y2:12}))
        );
        return e('button',{key:item.id,className:'ni '+(tab===item.id?'on':''),onClick:()=>setTab(item.id)},
          item.icon,
          e('span',{className:'nl'},item.label)
        );
      })
    ),
    showAdd && e(AddModal, { onClose:()=>setShowAdd(false), onAdd:addItem })
  );

  return e(IdleGuard, { onLogout:logout }, appShell);
}
