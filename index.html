<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0a0f1e"/>
<meta name="description" content="Flowo — Personal Budget Tracker"/>
<title>Flowo — Budget Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0f1e;--s1:#111827;--s2:#1a2234;--s3:#232d42;--acc:#6ee7b7;--acc2:#38bdf8;--acc3:#f472b6;--acc4:#fbbf24;--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--red:#f87171;--bdr:rgba(255,255,255,0.06);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#root{min-height:100vh}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 60% 0%,#1a2e4a,var(--bg) 60%)}
.logo{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.logo span{color:var(--acc)}
.tagline{color:var(--t2);font-size:14px;margin-bottom:40px;text-align:center}
.auth-card{background:var(--s1);border:1px solid var(--bdr);border-radius:20px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 4px 32px rgba(0,0,0,0.4)}
.tabs{display:flex;gap:4px;background:var(--s2);border-radius:var(--rs);padding:4px;margin-bottom:28px}
.tab{flex:1;text-align:center;padding:9px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:var(--t2);transition:all .2s;border:none;background:none;font-family:'DM Sans',sans-serif}
.tab.on{background:var(--s3);color:var(--t1)}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.inp{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);padding:12px 14px;color:var(--t1);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--t3)}
.fg{margin-bottom:16px}
.btn{width:100%;background:var(--acc);color:#0a0f1e;border:none;border-radius:var(--rs);padding:14px;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s,transform .1s}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--bdr);color:var(--t2)}
.btn-ghost:hover{background:var(--s2)}
.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--red);border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:16px}
/* LAYOUT */
.shell{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto}
.page{flex:1;padding:20px 16px 96px;overflow-y:auto}
/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--s1);border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-around;padding:10px 4px 20px;z-index:100}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 10px;border-radius:12px;transition:all .2s;border:none;background:none;color:var(--t3);flex:1}
.ni.on{color:var(--acc)}
.ni svg{width:22px;height:22px}
.nl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.nadd{background:var(--acc);color:#0a0f1e!important;border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;margin-top:-14px;box-shadow:0 4px 20px rgba(110,231,183,.3);flex:0 0 52px;border:3px solid var(--bg)}
/* CARDS */
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;margin-bottom:14px}
.card-sm{padding:14px 16px}
.hero{background:linear-gradient(135deg,#0d2640,#0a1f2e 60%,#091a24);border:1px solid rgba(110,231,183,.12);border-radius:20px;padding:26px 22px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(110,231,183,.07),transparent 70%);pointer-events:none}
.hlbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--t2);font-weight:600;margin-bottom:6px}
.hamt{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;color:var(--acc);letter-spacing:-2px;line-height:1;margin-bottom:3px}
.hsub{font-size:13px;color:var(--t2);margin-bottom:20px}
.hrow{display:flex;gap:10px}
.hstat{flex:1;background:rgba(255,255,255,.04);border-radius:var(--rs);padding:10px 12px}
.hsl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);font-weight:600;margin-bottom:3px}
.hsv{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
/* SECTION HEADER */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.st{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t2)}
.sa{font-size:12px;color:var(--acc);font-weight:600;cursor:pointer;background:none;border:none}
/* TX */
.tx{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr)}
.tx:last-child{border-bottom:none}
.txi{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.txn{flex:1;min-width:0}
.txname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txmeta{font-size:12px;color:var(--t2);margin-top:1px}
.txamt{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;flex-shrink:0}
.inc{color:var(--acc)}
.exp{color:var(--red)}
.txdel{background:none;border:none;color:var(--t3);cursor:pointer;padding:4px;font-size:15px;flex-shrink:0;transition:color .15s}
.txdel:hover{color:var(--red)}
/* CHART */
.ch{position:relative;height:196px}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s}
.drw{background:var(--s1);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:22px 20px 44px;max-height:90vh;overflow-y:auto;animation:su .25s ease-out}
.hdl{width:40px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 20px}
.mtitle{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:20px}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--bdr);background:var(--s2);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.chip.on{background:var(--acc);border-color:var(--acc);color:#0a0f1e;font-weight:700}
/* TOGGLE */
.trow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bdr)}
.tlbl{font-size:14px;color:var(--t2)}
.tog{width:44px;height:26px;background:var(--s3);border-radius:13px;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.tog.on{background:var(--acc)}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}
.tog.on::after{left:21px}
/* SEGMENT */
.seg{display:flex;gap:4px;background:var(--s2);border-radius:10px;padding:4px;margin-bottom:14px}
.sb{flex:1;text-align:center;padding:8px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);transition:all .15s;border:none;background:none;font-family:'DM Sans',sans-serif}
.sb.on{background:var(--s3);color:var(--t1)}
/* CHAT */
.cwrap{display:flex;flex-direction:column;height:calc(100vh - 168px)}
.cmsgs{flex:1;overflow-y:auto;padding:4px 0;display:flex;flex-direction:column;gap:10px}
.cb{max-width:87%;padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.55}
.cb.u{background:var(--acc);color:#0a0f1e;border-radius:18px 18px 4px 18px;align-self:flex-end;font-weight:500}
.cb.a{background:var(--s2);color:var(--t1);border-radius:18px 18px 18px 4px;align-self:flex-start;border:1px solid var(--bdr)}
.cb.ld{display:flex;gap:5px;align-items:center;padding:14px 18px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:bnc 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes bnc{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.cinp-wrap{display:flex;gap:10px;padding:12px 0 0;border-top:1px solid var(--bdr)}
.cinp{flex:1;background:var(--s2);border:1px solid var(--bdr);border-radius:24px;padding:12px 16px;color:var(--t1);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;resize:none}
.cinp:focus{border-color:var(--acc)}
.csend{background:var(--acc);color:#0a0f1e;border:none;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;align-self:flex-end}
.csend:disabled{opacity:.45;cursor:not-allowed}
/* PROFILE */
.pav{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px}
.pname{text-align:center;font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.pemail{text-align:center;color:var(--t2);font-size:13px;margin-bottom:28px}
.mi{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--bdr);cursor:pointer}
.mic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mit{flex:1;font-size:14px;font-weight:500}
.mia{color:var(--t3);font-size:18px}
/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.bg{background:rgba(110,231,183,.1);color:var(--acc)}
.br{background:rgba(248,113,113,.1);color:var(--red)}
.bb{background:rgba(56,189,248,.1);color:var(--acc2)}
.by{background:rgba(251,191,36,.1);color:var(--acc4)}
/* PROGRESS */
.pbar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:10px}
.pfill{height:100%;border-radius:3px;transition:width .5s ease}
/* OFFLINE */
.offbanner{background:rgba(251,191,36,.08);border-bottom:1px solid rgba(251,191,36,.15);color:var(--acc4);padding:7px 16px;font-size:12px;font-weight:600;text-align:center}
/* MISC */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.ptitle{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.empty{text-align:center;padding:36px 20px;color:var(--t2)}
.eico{font-size:36px;margin-bottom:10px}
.etxt{font-size:14px;line-height:1.5}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sr-row{display:flex;gap:10px;margin-bottom:14px}
.scard{flex:1;background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;text-align:center}
.sico{font-size:20px;margin-bottom:5px}
.sval{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:1px}
.slbl{font-size:11px;color:var(--t2);font-weight:500}
.days-big{font-family:'Syne',sans-serif;font-size:54px;font-weight:800;color:var(--acc2);line-height:1}
.days-lbl{font-size:13px;color:var(--t2);font-weight:500}
.stitle{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:10px;padding:0 2px}
select.inp{appearance:none}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef } = React;

// ── CONFIG (replace with your Supabase keys) ──────────────────────────────
const SUPA_URL  = 'https://YOUR_PROJECT.supabase.co';
const SUPA_KEY  = 'YOUR_ANON_KEY';

// ── LOCAL STORAGE DB ──────────────────────────────────────────────────────
const DB = {
  g: k => { try { return JSON.parse(localStorage.getItem(k)||'null') } catch { return null } },
  s: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
  list: k => DB.g(k) || [],
  add: (k,item) => { const l=[{...item,id:Date.now()+Math.random()},...DB.list(k)]; DB.s(k,l); return l },
  del: (k,id) => { const l=DB.list(k).filter(i=>i.id!==id); DB.s(k,l); return l }
};

// ── HELPERS ───────────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n||0);
const fmtD = d => new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
const todayStr = () => new Date().toISOString().split('T')[0];

const CAT = {
  Food:        {e:'🍔',bg:'rgba(251,191,36,.12)',c:'#fbbf24'},
  Transport:   {e:'🚗',bg:'rgba(56,189,248,.12)',c:'#38bdf8'},
  Bills:       {e:'📱',bg:'rgba(248,113,113,.12)',c:'#f87171'},
  Rent:        {e:'🏠',bg:'rgba(167,139,250,.12)',c:'#a78bfa'},
  Health:      {e:'💊',bg:'rgba(110,231,183,.12)',c:'#6ee7b7'},
  Shopping:    {e:'🛍️',bg:'rgba(244,114,182,.12)',c:'#f472b6'},
  Entertainment:{e:'🎮',bg:'rgba(99,102,241,.12)',c:'#818cf8'},
  Savings:     {e:'💰',bg:'rgba(110,231,183,.12)',c:'#6ee7b7'},
  Other:       {e:'📦',bg:'rgba(148,163,184,.12)',c:'#94a3b8'}
};
const CATS = Object.keys(CAT);

function nextPayday(paydays){
  if(!paydays||!paydays.length) return {days:0,date:null};
  const now=new Date(), m=now.getMonth(), y=now.getFullYear();
  let best=null,bd=9999;
  for(const pd of paydays){
    let d=new Date(y,m,pd);
    if(d<=now) d=new Date(y,m+1,pd);
    const diff=Math.ceil((d-now)/(864e5));
    if(diff<bd){bd=diff;best=d}
  }
  return {days:bd,date:best};
}

// ── AUTH SCREEN ───────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [tab,setTab]=useState('login');
  const [em,setEm]=useState('');
  const [pw,setPw]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');

  const go=async()=>{
    if(!em||!pw){setErr('Fill in all fields');return}
    setLoading(true);setErr('');
    // If demo (no Supabase configured), skip straight through
    if(SUPA_URL.includes('YOUR_PROJECT')){
      DB.s('user',{id:'demo',email:em});
      onAuth({id:'demo',email:em});
      return;
    }
    try{
      const url=tab==='login'
        ?`${SUPA_URL}/auth/v1/token?grant_type=password`
        :`${SUPA_URL}/auth/v1/signup`;
      const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPA_KEY},body:JSON.stringify({email:em,password:pw})});
      const d=await r.json();
      if(d.error||d.msg){setErr(d.error_description||d.msg||'Auth failed')}
      else{const u=d.user||d;DB.s('user',u);onAuth(u)}
    }catch{
      DB.s('user',{id:'demo',email:em});
      onAuth({id:'demo',email:em});
    }
    setLoading(false);
  };

  return React.createElement('div',{className:'auth-wrap'},
    React.createElement('div',{className:'logo'},'Flow',React.createElement('span',null,'o')),
    React.createElement('div',{className:'tagline'},'Your money, beautifully managed.'),
    React.createElement('div',{className:'auth-card'},
      React.createElement('div',{className:'tabs'},
        ['login','signup'].map(t=>React.createElement('button',{key:t,className:'tab '+(tab===t?'on':''),onClick:()=>setTab(t)},t==='login'?'Sign In':'Sign Up'))
      ),
      err&&React.createElement('div',{className:'err'},err),
      React.createElement('div',{className:'fg'},
        React.createElement('label',{className:'lbl'},'Email'),
        React.createElement('input',{className:'inp',type:'email',placeholder:'you@email.com',value:em,onChange:e=>setEm(e.target.value),onKeyDown:e=>e.key==='Enter'&&go()})
      ),
      React.createElement('div',{className:'fg'},
        React.createElement('label',{className:'lbl'},'Password'),
        React.createElement('input',{className:'inp',type:'password',placeholder:'••••••••',value:pw,onChange:e=>setPw(e.target.value),onKeyDown:e=>e.key==='Enter'&&go()})
      ),
      React.createElement('button',{className:'btn',onClick:go,disabled:loading},loading?'Please wait…':tab==='login'?'Sign In':'Create Account'),
      React.createElement('p',{style:{textAlign:'center',marginTop:14,fontSize:12,color:'var(--t3)'}},
        '✦ No Supabase? Any credentials work in demo mode')
    )
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function Dashboard({data}){
  const {income,expenses,planned,paydays}=data;
  const [period,setPeriod]=useState('month');
  const [showAll,setShowAll]=useState(false);
  const pieRef=useRef(null),lineRef=useRef(null);
  const pieChart=useRef(null),lineChart=useRef(null);

  const totInc=income.reduce((s,i)=>s+parseFloat(i.amount),0);
  const totExp=expenses.reduce((s,e)=>s+parseFloat(e.amount),0);
  const totPlan=planned.reduce((s,p)=>s+parseFloat(p.amount),0);
  const rem=totInc-totExp-totPlan;
  const {days}=nextPayday(paydays);
  const daily=days>0?rem/days:0;

  const filterExp=(list,p)=>{
    const now=new Date();
    return list.filter(e=>{
      const d=new Date(e.date);
      if(p==='day') return d.toDateString()===now.toDateString();
      if(p==='week'){const w=new Date(now);w.setDate(w.getDate()-7);return d>=w}
      return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    });
  };
  const periodTotal=filterExp(expenses,period).reduce((s,e)=>s+parseFloat(e.amount),0);

  const catTot={};
  expenses.forEach(e=>{catTot[e.category]=(catTot[e.category]||0)+parseFloat(e.amount)});

  // Pie
  useEffect(()=>{
    if(!pieRef.current) return;
    pieChart.current?.destroy();
    const cats=Object.keys(catTot);
    if(!cats.length) return;
    pieChart.current=new Chart(pieRef.current,{
      type:'doughnut',
      data:{labels:cats,datasets:[{data:cats.map(c=>catTot[c]),backgroundColor:cats.map(c=>CAT[c]?.c||'#94a3b8'),borderWidth:0,hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:11,family:'DM Sans'},boxWidth:9,padding:12}}},cutout:'66%'}
    });
    return()=>pieChart.current?.destroy();
  },[JSON.stringify(catTot)]);

  // Line
  useEffect(()=>{
    if(!lineRef.current) return;
    lineChart.current?.destroy();
    const d7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d});
    const labels=d7.map(d=>d.toLocaleDateString('en-US',{weekday:'short'}));
    const vals=d7.map(d=>expenses.filter(e=>new Date(e.date).toDateString()===d.toDateString()).reduce((s,e)=>s+parseFloat(e.amount),0));
    lineChart.current=new Chart(lineRef.current,{
      type:'line',
      data:{labels,datasets:[{data:vals,borderColor:'#38bdf8',borderWidth:2,fill:true,backgroundColor:'rgba(56,189,248,.06)',tension:.4,pointBackgroundColor:'#38bdf8',pointRadius:3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#475569',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#475569',font:{size:11},callback:v=>'$'+v}}}}
    });
    return()=>lineChart.current?.destroy();
  },[JSON.stringify(expenses)]);

  const recent=[...expenses].slice(0,showAll?30:5);

  return React.createElement('div',null,
    // Header

// ── AI ASSISTANT ──────────────────────────────────────────────────────────
function AIChat({data}){
  const [msgs,setMsgs]=useState([{r:'a',t:"Hey! 👋 I'm your financial assistant. Ask me anything — like \"Can I afford this?\" or \"How much can I spend today?\""}]);
  const [inp,setInp]=useState('');
  const [busy,setBusy]=useState(false);
  const endRef=useRef(null);

  useEffect(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),[msgs]);

  const ctx=()=>{
    const {income,expenses,planned,paydays}=data;
    const totInc=income.reduce((s,i)=>s+parseFloat(i.amount),0);
    const totExp=expenses.reduce((s,e)=>s+parseFloat(e.amount),0);
    const totPlan=planned.reduce((s,p)=>s+parseFloat(p.amount),0);
    const rem=totInc-totExp-totPlan;
    const {days}=nextPayday(paydays);
    const daily=days>0?rem/days:0;
    const cs={};expenses.forEach(e=>{cs[e.category]=(cs[e.category]||0)+parseFloat(e.amount)});
    return `User Financial Snapshot:\n- Income: $${totInc.toFixed(2)}\n- Expenses: $${totExp.toFixed(2)}\n- Planned: $${totPlan.toFixed(2)}\n- Remaining: $${rem.toFixed(2)}\n- Days to payday: ${days}\n- Daily budget: $${daily.toFixed(2)}\n- Category breakdown: ${JSON.stringify(cs)}\n- Upcoming: ${planned.map(p=>p.name+' $'+p.amount).join(', ')||'none'}`;
  };

  const fallback=q=>{
    const {income,expenses,planned,paydays}=data;
    const totInc=income.reduce((s,i)=>s+parseFloat(i.amount),0);
    const totExp=expenses.reduce((s,e)=>s+parseFloat(e.amount),0);
    const totPlan=planned.reduce((s,p)=>s+parseFloat(p.amount),0);
    const rem=totInc-totExp-totPlan;
    const {days}=nextPayday(paydays);
    const daily=days>0?rem/days:0;
    if(/today|spend|daily/.test(q.toLowerCase())) return `Your daily budget is ${fmt(daily)} with ${fmt(rem)} left until payday in ${days} days. Stay within that and you'll be fine! 💪`;
    if(/afford/.test(q.toLowerCase())) return rem>200?`You have ${fmt(rem)} remaining — looks okay, but don't forget planned expenses!`:`Your balance is ${fmt(rem)}, which is getting low. Be cautious! ⚠️`;
    return `Balance: ${fmt(rem)} | Daily: ${fmt(daily)} | ${days} days to payday. You're doing ${rem>0?'okay!':'tight — watch your spending!'}`;
  };

  const send=async()=>{
    if(!inp.trim()||busy) return;
    const q=inp.trim(); setInp('');
    setMsgs(m=>[...m,{r:'u',t:q}]);
    setBusy(true);
    try{
      const history=msgs.filter(m=>!m.ld).map(m=>({role:m.r==='a'?'assistant':'user',content:m.t}));
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:`You are a friendly financial assistant for Flowo, a budgeting app. Give short (under 90 words), practical, encouraging advice. No jargon. Use 1-2 emoji max.\n\n${ctx()}`,
          messages:[...history,{role:'user',content:q}]
        })
      });
      const d=await res.json();
      setMsgs(m=>[...m,{r:'a',t:d.content?.[0]?.text||'Something went wrong. Try again!'}]);
    }catch{
      setMsgs(m=>[...m,{r:'a',t:fallback(q)}]);
    }
    setBusy(false);
  };

  const quick=['How much can I spend today?','Am I on track?','Where am I overspending?',"What's my daily budget?"];

  return React.createElement('div',null,
    React.createElement('div',{className:'ph'},React.createElement('div',{className:'ptitle'},'AI Assistant'),React.createElement('span',{className:'bdg bg'},'Active')),
    React.createElement('div',{className:'cwrap'},
      React.createElement('div',{className:'cmsgs'},
        msgs.map((m,i)=>React.createElement('div',{key:i,className:'cb '+(m.r==='u'?'u':'a')},m.t)),
        busy&&React.createElement('div',{className:'cb a ld'},React.createElement('div',{className:'dot'}),React.createElement('div',{className:'dot'}),React.createElement('div',{className:'dot'})),
        msgs.length===1&&!busy&&React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:7,padding:'4px 0'}},
          quick.map(q=>React.createElement('div',{key:q,className:'chip',style:{fontSize:12},onClick:()=>setInp(q)},q))
        ),
        React.createElement('div',{ref:endRef})
      ),
      React.createElement('div',{className:'cinp-wrap'},
        React.createElement('textarea',{className:'cinp',placeholder:'Ask about your budget…',value:inp,onChange:e=>setInp(e.target.value),onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}},rows:1}),
        React.createElement('button',{className:'csend',onClick:send,disabled:busy||!inp.trim()},
          React.createElement('svg',{viewBox:'0 0 24 24',fill:'currentColor',width:18,height:18},React.createElement('path',{d:'M2 21l21-9L2 3v7l15 2-15 2v7z'}))
        )
      )
    )
  );
}
