<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0a0f1e"/>
<title>Flowo — Budget Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
[data-theme="dark"]{--bg:#0a0f1e;--s1:#111827;--s2:#1a2234;--s3:#232d42;--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--bdr:rgba(255,255,255,0.07);--hero:linear-gradient(135deg,#0d2640,#0a1f2e 60%,#091a24);--hero-bdr:rgba(110,231,183,0.12)}
[data-theme="light"]{--bg:#f0f4f8;--s1:#ffffff;--s2:#f1f5f9;--s3:#e2e8f0;--t1:#0f172a;--t2:#475569;--t3:#94a3b8;--bdr:rgba(0,0,0,0.08);--hero:linear-gradient(135deg,#0d2640,#0a3020);--hero-bdr:rgba(110,231,183,0.2)}
:root{--acc:#6ee7b7;--acc2:#38bdf8;--acc3:#f472b6;--acc4:#fbbf24;--red:#f87171;--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .25s,color .25s}
#root{min-height:100vh}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 60% 0%,#1a2e4a,#0a0f1e 60%)}
.logo{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;letter-spacing:-1px}
.logo span{color:var(--acc)}
.tagline{color:#94a3b8;font-size:14px;margin:6px 0 36px;text-align:center}
.auth-card{background:#111827;border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 4px 32px rgba(0,0,0,0.4)}
.tabs{display:flex;gap:4px;background:#1a2234;border-radius:var(--rs);padding:4px;margin-bottom:24px}
.tab{flex:1;text-align:center;padding:9px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#94a3b8;transition:all .2s;border:none;background:none;font-family:'DM Sans',sans-serif}
.tab.on{background:#232d42;color:#f1f5f9}

/* FORM */
.fg{margin-bottom:14px}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.inp{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);padding:12px 14px;color:var(--t1);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--t3)}
select.inp{appearance:none}
.btn{width:100%;background:var(--acc);color:#0a0f1e;border:none;border-radius:var(--rs);padding:13px;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s,transform .1s}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--bdr);color:var(--t2);font-family:'DM Sans',sans-serif}
.btn-ghost:hover{background:var(--s2)}
.btn-red{background:var(--red);color:#fff}
.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--red);border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:14px}
.ok{background:rgba(110,231,183,.1);border:1px solid rgba(110,231,183,.2);color:var(--acc);border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:14px}

/* LAYOUT */
.shell{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto}
.page{flex:1;padding:20px 16px 100px;overflow-y:auto}

/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--s1);border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-around;padding:10px 2px 20px;z-index:100;transition:background .25s}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 6px;border-radius:12px;transition:all .2s;border:none;background:none;color:var(--t3);flex:1;font-family:'DM Sans',sans-serif}
.ni.on{color:var(--acc)}
.ni svg{width:20px;height:20px}
.nl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.nadd{background:var(--acc);color:#0a0f1e!important;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;margin-top:-12px;box-shadow:0 4px 20px rgba(110,231,183,.35);flex:0 0 50px;border:3px solid var(--bg)}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;margin-bottom:12px;transition:background .25s}
.card-sm{padding:14px 16px}
.hero{background:var(--hero);border:1px solid var(--hero-bdr);border-radius:20px;padding:24px 20px;margin-bottom:12px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(110,231,183,.07),transparent 70%);pointer-events:none}
.hlbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.5);font-weight:600;margin-bottom:5px}
.hamt{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;color:var(--acc);letter-spacing:-2px;line-height:1;margin-bottom:2px}
.hsub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:18px}
.hrow{display:flex;gap:8px}
.hstat{flex:1;background:rgba(255,255,255,.05);border-radius:var(--rs);padding:10px}
.hsl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.4);font-weight:600;margin-bottom:2px}
.hsv{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#fff}

/* SECTION */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.st{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t2)}
.sa{font-size:12px;color:var(--acc);font-weight:600;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif}

/* TRANSACTIONS */
.tx{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr)}
.tx:last-child{border-bottom:none}
.txi{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.txn{flex:1;min-width:0}
.txname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txmeta{font-size:12px;color:var(--t2);margin-top:1px}
.txamt{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;flex-shrink:0}
.inc{color:var(--acc)}
.exp{color:var(--red)}
.txdel{background:none;border:none;color:var(--t3);cursor:pointer;padding:4px;font-size:15px;flex-shrink:0;transition:color .15s}
.txdel:hover{color:var(--red)}

/* CHART */
.ch{position:relative;height:190px}

/* MODAL / DRAWER */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s}
.drw{background:var(--s1);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px 20px 44px;max-height:92vh;overflow-y:auto;animation:su .25s ease-out}
.hdl{width:40px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 18px}
.mtitle{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:18px}

/* CONFIRM MODAL (centered) */
.ov-center{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;animation:fi .2s}
.modal-box{background:var(--s1);border:1px solid var(--bdr);border-radius:20px;padding:28px 24px;width:100%;max-width:380px;animation:pop .2s ease-out}
.modal-box-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px}
.modal-box-desc{font-size:14px;color:var(--t2);margin-bottom:20px;line-height:1.5}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--bdr);background:var(--s2);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.chip.on{background:var(--acc);border-color:var(--acc);color:#0a0f1e;font-weight:700}

/* TOGGLE */
.trow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bdr)}
.trow:last-child{border-bottom:none}
.tlbl{font-size:14px;color:var(--t1)}
.tog{width:44px;height:26px;background:var(--s3);border-radius:13px;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.tog.on{background:var(--acc)}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog.on::after{left:21px}

/* SEGMENT */
.seg{display:flex;gap:4px;background:var(--s2);border-radius:10px;padding:4px;margin-bottom:14px}
.sb{flex:1;text-align:center;padding:8px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);transition:all .15s;border:none;background:none;font-family:'DM Sans',sans-serif}
.sb.on{background:var(--s3);color:var(--t1)}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.bg{background:rgba(110,231,183,.12);color:var(--acc)}
.br{background:rgba(248,113,113,.12);color:var(--red)}
.bb{background:rgba(56,189,248,.12);color:var(--acc2)}
.by{background:rgba(251,191,36,.12);color:var(--acc4)}

/* PROGRESS */
.pbar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:8px}
.pfill{height:100%;border-radius:3px;transition:width .6s ease}

/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.ptitle{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}

/* EMPTY */
.empty{text-align:center;padding:32px 20px;color:var(--t2)}
.eico{font-size:36px;margin-bottom:10px}
.etxt{font-size:14px;line-height:1.6}

/* PROFILE */
.pav-wrap{position:relative;width:90px;margin:0 auto 14px;cursor:pointer}
.pav{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden;border:3px solid var(--bdr)}
.pav img{width:90px;height:90px;object-fit:cover;display:block;border-radius:50%}
.pav-edit{position:absolute;bottom:2px;right:2px;width:28px;height:28px;border-radius:50%;background:var(--acc);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.pav-remove{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--red);cursor:pointer;margin-top:4px;padding:3px 8px;border-radius:20px;border:none;background:rgba(248,113,113,.08);font-family:'DM Sans',sans-serif}
.pname{text-align:center;font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.pemail{text-align:center;color:var(--t2);font-size:13px;margin-bottom:24px}
.mi{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--bdr);cursor:pointer}
.mi:last-child{border-bottom:none}
.mic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mit{flex:1;font-size:14px;font-weight:500}
.mia{color:var(--t3);font-size:18px}

/* GOALS */
.goal-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:10px}
.goal-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.goal-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.goal-info{flex:1;min-width:0}
.goal-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.goal-meta{font-size:12px;color:var(--t2);margin-top:2px}
.goal-amounts{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-top:6px}
.goal-amounts span:last-child{color:var(--t1);font-weight:600}

/* INSIGHT */
.insight{background:linear-gradient(135deg,#0d1f3c,#0f1a2e);border:1px solid rgba(56,189,248,.15);border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
[data-theme="light"] .insight{background:linear-gradient(135deg,#e8f4fd,#f0faff);border-color:rgba(56,189,248,.25)}
.insight-ico{font-size:22px;flex-shrink:0;margin-top:1px}
.insight-title{font-size:13px;font-weight:700;margin-bottom:2px;color:var(--acc2)}
.insight-txt{font-size:13px;color:var(--t2);line-height:1.5}

/* LOG FILTERS */
.filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.filter-row::-webkit-scrollbar{display:none}
.fcip{padding:7px 14px;border-radius:20px;border:1px solid var(--bdr);background:var(--s2);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'DM Sans',sans-serif;flex-shrink:0}
.fcip.on{background:var(--acc);border-color:var(--acc);color:#0a0f1e;font-weight:700}

/* DATE GROUP */
.dg-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);padding:10px 0 5px}

/* PIN DOTS */
.pin-dots{display:flex;gap:12px;justify-content:center;margin:16px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--t3);transition:all .15s}
.pin-dot.filled{background:var(--acc);border-color:var(--acc)}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto}
.pin-key{background:var(--s2);border:1px solid var(--bdr);border-radius:14px;padding:16px;font-family:'Syne',sans-serif;font-size:20px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;color:var(--t1)}
.pin-key:active{transform:scale(.93);background:var(--s3)}
.pin-key.del{font-size:16px;color:var(--t2)}

/* OFFLINE */
.offbanner{background:rgba(251,191,36,.08);border-bottom:1px solid rgba(251,191,36,.15);color:var(--acc4);padding:7px 16px;font-size:12px;font-weight:600;text-align:center}

/* SESSION TIMEOUT */
.session-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;animation:fi .3s}
.session-box{background:var(--s1);border:1px solid var(--bdr);border-radius:24px;padding:32px 28px;width:100%;max-width:340px;text-align:center;animation:pop .25s ease-out}
.session-icon{font-size:48px;margin-bottom:16px}
.session-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px}
.session-desc{font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:24px}
.session-countdown{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--red);line-height:1;margin-bottom:6px}
.session-countdown-lbl{font-size:12px;color:var(--t3);margin-bottom:24px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.session-bar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-bottom:24px}
.session-bar-fill{height:100%;background:var(--red);border-radius:3px;transition:width 1s linear}

/* MISC */
.col2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stitle{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:10px;padding:0 2px}
.days-big{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--acc2);line-height:1}
.days-lbl{font-size:13px;color:var(--t2);font-weight:500}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn-row .btn{flex:1}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useMemo}=React;

/* ── STORAGE ─────────────────────────────────────────────── */
const DB={
  g:k=>{try{return JSON.parse(localStorage.getItem(k)||'null')}catch{return null}},
  s:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  list:k=>DB.g(k)||[],
  add:(k,item)=>{const l=[{...item,id:Date.now()+Math.random()},...DB.list(k)];DB.s(k,l);return l},
  del:(k,id)=>{const l=DB.list(k).filter(i=>i.id!==id);DB.s(k,l);return l}
};

/* ── HELPERS ─────────────────────────────────────────────── */
const fmt=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n||0);
const fmtD=d=>new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
const fmtFull=d=>new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
const todayStr=()=>new Date().toISOString().split('T')[0];

const CAT={
  Food:{e:'🍔',bg:'rgba(251,191,36,.12)',c:'#fbbf24'},
  Transport:{e:'🚗',bg:'rgba(56,189,248,.12)',c:'#38bdf8'},
  Bills:{e:'📱',bg:'rgba(248,113,113,.12)',c:'#f87171'},
  Rent:{e:'🏠',bg:'rgba(167,139,250,.12)',c:'#a78bfa'},
  Health:{e:'💊',bg:'rgba(110,231,183,.12)',c:'#6ee7b7'},
  Shopping:{e:'🛍️',bg:'rgba(244,114,182,.12)',c:'#f472b6'},
  Entertainment:{e:'🎮',bg:'rgba(99,102,241,.12)',c:'#818cf8'},
  Savings:{e:'💰',bg:'rgba(110,231,183,.12)',c:'#6ee7b7'},
  Other:{e:'📦',bg:'rgba(148,163,184,.12)',c:'#94a3b8'}
};
const CATS=Object.keys(CAT);
const GOAL_COLORS=['#6ee7b7','#38bdf8','#f472b6','#fbbf24','#a78bfa','#f87171'];
const GOAL_ICONS=['🏠','✈️','🚗','📱','💍','🎓','🏋️','🌍','💻','🛋️','🎸','🐶'];

function nextPayday(paydays){
  if(!paydays||!paydays.length)return{days:0,date:null};
  const now=new Date(),m=now.getMonth(),y=now.getFullYear();
  let best=null,bd=9999;
  for(const pd of paydays){
    let d=new Date(y,m,pd);
    if(d<=now)d=new Date(y,m+1,pd);
    const diff=Math.ceil((d-now)/864e5);
    if(diff<bd){bd=diff;best=d}
  }
  return{days:bd,date:best};
}
function setTheme(t){document.documentElement.setAttribute('data-theme',t);DB.s('theme',t)}

/* ── INSIGHTS ────────────────────────────────────────────── */
function getInsights(data){
  const{income,expenses,planned,paydays}=data;
  const now=new Date();
  const thisMonth=expenses.filter(ex=>{const d=new Date(ex.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
  const totInc=income.reduce((s,i)=>s+parseFloat(i.amount),0);
  const totExp=expenses.reduce((s,ex)=>s+parseFloat(ex.amount),0);
  const totPlan=planned.reduce((s,p)=>s+parseFloat(p.amount),0);
  const rem=totInc-totExp-totPlan;
  const{days}=nextPayday(paydays);
  const daily=days>0?rem/days:0;
  const catTot={};thisMonth.forEach(ex=>{catTot[ex.category]=(catTot[ex.category]||0)+parseFloat(ex.amount)});
  const topCat=Object.entries(catTot).sort((a,b)=>b[1]-a[1])[0];
  const out=[];
  const savRate=totInc>0?((totInc-totExp)/totInc)*100:0;
  if(savRate>=20)out.push({icon:'🎉',title:'Great Savings Rate!',text:`You're saving ${savRate.toFixed(0)}% of your income — above the recommended 20%. Keep it up!`});
  else if(savRate>0&&totInc>0)out.push({icon:'💡',title:'Boost Your Savings',text:`You're saving ${savRate.toFixed(0)}% right now. Try cutting one expense to reach 20%.`});
  if(topCat)out.push({icon:'🔍',title:`Top Spend: ${topCat[0]}`,text:`${fmt(topCat[1])} on ${topCat[0]} this month. ${topCat[1]>totInc*0.3?'That\'s over 30% of income!':'Watch this category.'}`});
  if(daily>0)out.push({icon:'📅',title:'Daily Budget',text:`You can safely spend ${fmt(daily)}/day until payday in ${days} days.`});
  if(rem<0)out.push({icon:'🚨',title:'Over Budget!',text:`You're ${fmt(Math.abs(rem))} over budget. Consider deferring non-essential expenses.`});
  const urgentBills=planned.filter(p=>Math.ceil((new Date(p.due_date)-now)/864e5)<=7);
  if(urgentBills.length>0)out.push({icon:'⚠️',title:'Bills Due Soon',text:`${urgentBills.length} bill${urgentBills.length>1?'s':''} due within 7 days: ${fmt(urgentBills.reduce((s,p)=>s+parseFloat(p.amount),0))} total.`});
  if(out.length===0)out.push({icon:'✨',title:'All Good!',text:'Add transactions to unlock personalised financial insights here.'});
  return out;
}

/* ── PIN MODAL ───────────────────────────────────────────── */
// mode: 'set'    → create brand-new PIN (enter → confirm)
// mode: 'verify' → enter existing PIN to unlock an action
// mode: 'reset'  → verify current PIN first, then enter + confirm new PIN
function PinModal({onSuccess,onCancel,mode}){
  const initStep=mode==='set'?'enter':mode==='reset'?'verify-old':'verify';
  const[pin,setPin]=useState('');
  const[confirm,setConfirm]=useState('');
  const[step,setStep]=useState(initStep);
  const[err,setErr]=useState('');

  const STEPS={
    'verify':     {title:'Enter your PIN',      desc:'Enter your PIN to continue.'},
    'verify-old': {title:'Enter current PIN',   desc:'Step 1 of 2 — confirm your existing PIN first.'},
    'enter':      {title:mode==='reset'?'Set new PIN':'Create a PIN',desc:mode==='reset'?'Step 2 of 2 — choose your new 4-digit PIN.':'Choose a 4-digit PIN.'},
    'confirm':    {title:'Confirm new PIN',     desc:'Enter the same PIN again to confirm.'},
  };
  const{title,desc}=STEPS[step]||{};

  const handleKey=k=>{
    if(step==='verify'){
      const np=pin+k; if(np.length>4)return;
      setPin(np);
      if(np.length===4){
        const saved=DB.g('clear_pin');
        if(np===saved)setTimeout(()=>onSuccess(),120);
        else setTimeout(()=>{setPin('');setErr('Incorrect PIN. Try again.')},300);
      }
    } else if(step==='verify-old'){
      const np=pin+k; if(np.length>4)return;
      setPin(np);
      if(np.length===4){
        const saved=DB.g('clear_pin');
        if(np===saved)setTimeout(()=>{setPin('');setErr('');setStep('enter')},200);
        else setTimeout(()=>{setPin('');setErr('Incorrect PIN. Try again.')},300);
      }
    } else if(step==='enter'){
      const np=pin+k; if(np.length>4)return;
      setPin(np);
      if(np.length===4)setTimeout(()=>setStep('confirm'),150);
    } else if(step==='confirm'){
      const np=confirm+k; if(np.length>4)return;
      setConfirm(np);
      if(np.length===4){
        if(np===pin){DB.s('clear_pin',pin);setTimeout(()=>onSuccess(),120)}
        else setTimeout(()=>{setConfirm('');setErr('PINs do not match. Try again.');setStep('enter');setPin('')},300);
      }
    }
  };

  const del=()=>{
    if((step==='verify'||step==='verify-old'||step==='enter')&&pin.length>0)setPin(p=>p.slice(0,-1));
    else if(step==='confirm'&&confirm.length>0)setConfirm(p=>p.slice(0,-1));
  };

  const current=step==='confirm'?confirm:pin;

  return e('div',{className:'ov-center'},
    e('div',{className:'modal-box'},
      e('div',{className:'modal-box-title'},title),
      e('div',{className:'modal-box-desc'},desc),
      mode==='reset'&&e('div',{style:{display:'flex',gap:6,justifyContent:'center',marginBottom:12}},
        [0,1].map(i=>e('div',{key:i,style:{
          height:4,width:40,borderRadius:2,
          background:(step==='verify-old'&&i===0)||(step!=='verify-old'&&i===1)?'var(--acc)':'var(--s3)',
          transition:'background .3s'
        }}))
      ),
      err&&e('div',{className:'err',style:{marginBottom:10}},err),
      e('div',{className:'pin-dots'},
        [0,1,2,3].map(i=>e('div',{key:i,className:'pin-dot '+(i<current.length?'filled':'')}))
      ),
      e('div',{className:'pin-keypad'},
        ['1','2','3','4','5','6','7','8','9','','0','del'].map((k,i)=>{
          if(k==='')return e('div',{key:i});
          return e('button',{key:i,className:'pin-key '+(k==='del'?'del':''),onClick:()=>k==='del'?del():handleKey(k)},k==='del'?'\u232b':k);
        })
      ),
      e('button',{className:'btn btn-ghost',style:{marginTop:16},onClick:onCancel},'Cancel')
    )
  );
}

      if(p==='week'){const w=new Date(now);w.setDate(w.getDate()-7);return d>=w}

function LogHistory({data,onDel}){
  const{income,expenses}=data;
  const[catFilter,setCatFilter]=useState('All');
  const[typeFilter,setTypeFilter]=useState('All');
  const[dateFrom,setDateFrom]=useState('');
  const[dateTo,setDateTo]=useState('');
  const[showFilters,setShowFilters]=useState(false);

  const all=useMemo(()=>[
    ...expenses.map(ex=>({...ex,_type:'expense'})),
    ...income.map(i=>({...i,_type:'income',category:'Income',notes:i.source}))
  ].sort((a,b)=>new Date(b.date)-new Date(a.date)),[expenses,income]);

  const filtered=useMemo(()=>all.filter(tx=>{
    if(typeFilter!=='All'&&tx._type!==typeFilter.toLowerCase())return false;
    if(catFilter!=='All'&&tx.category!==catFilter)return false;
    if(dateFrom&&tx.date<dateFrom)return false;
    if(dateTo&&tx.date>dateTo)return false;

  const grouped=useMemo(()=>{

  const totalExp=filtered.filter(t=>t._type==='expense').reduce((s,t)=>s+parseFloat(t.amount),0);

        e('div',null,e('div',{style:{fontSize:11,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.5px',fontWeight:700,marginBottom:2}},'Net'),e('div',{style:{fontFamily:'Syne,sans-serif',fontSize:18,fontWeight:700,color:(totalInc-totalExp)>=0?'var(--acc)':'var(--red)'}},fmt(totalInc-totalExp)))

/* ── SESSION TIMEOUT ─────────────────────────────────────── */
const IDLE_MS   = 5 * 60 * 1000; // 5 minutes idle → show warning
const WARN_SECS = 60;             // 60-second countdown before auto-logout

function SessionGuard({onLogout,children}){
  const[warning,setWarning]=useState(false);
  const[countdown,setCountdown]=useState(WARN_SECS);
  const idleTimer=useRef(null);
  const warnTimer=useRef(null);

  const resetIdle=()=>{
    if(warning) return; // don't reset while warning is showing
    clearTimeout(idleTimer.current);
    idleTimer.current=setTimeout(()=>{
      setWarning(true);
      setCountdown(WARN_SECS);
    },IDLE_MS);
  };

  // Start/restart idle timer on any user activity
  useEffect(()=>{
    const events=['mousemove','mousedown','keydown','touchstart','touchmove','scroll','click'];
    events.forEach(ev=>window.addEventListener(ev,resetIdle,{passive:true}));
    resetIdle(); // kick off on mount
    return()=>{
      events.forEach(ev=>window.removeEventListener(ev,resetIdle));
      clearTimeout(idleTimer.current);
      clearInterval(warnTimer.current);
    };
  },[warning]);

  // Countdown tick when warning is visible
  useEffect(()=>{
    if(!warning) return;
    clearInterval(warnTimer.current);
    warnTimer.current=setInterval(()=>{
      setCountdown(c=>{
        if(c<=1){
          clearInterval(warnTimer.current);
          onLogout();
          return 0;
        }
        return c-1;
      });
    },1000);
    return()=>clearInterval(warnTimer.current);
  },[warning]);

  const stayActive=()=>{
    setWarning(false);
    clearInterval(warnTimer.current);
    clearTimeout(idleTimer.current);
    idleTimer.current=setTimeout(()=>{setWarning(true);setCountdown(WARN_SECS)},IDLE_MS);
  };

  const pct=(countdown/WARN_SECS)*100;

  return e('div',null,
    children,
    warning&&e('div',{className:'session-overlay'},
      e('div',{className:'session-box'},
        e('div',{className:'session-icon'},'⏱️'),
        e('div',{className:'session-title'},'Still there?'),
        e('div',{className:'session-countdown'},countdown),
        e('div',{className:'session-countdown-lbl'},'seconds before sign-out'),
        e('div',{className:'session-bar'},
          e('div',{className:'session-bar-fill',style:{width:pct+'%'}})
        ),
        e('div',{className:'session-desc'},'You\'ve been inactive for 5 minutes.\nTap below to stay signed in.'),
        e('button',{className:'btn',onClick:stayActive},'Yes, keep me signed in'),
        e('button',{className:'btn btn-ghost',style:{marginTop:10},onClick:onLogout},'Sign out now')
      )
    )
  );
}

  const navDefs=[
    {id:'dashboard',label:'Home',svg:()=>e('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'},e('rect',{x:3,y:3,width:7,height:7}),e('rect',{x:14,y:3,width:7,height:7}),e('rect',{x:14,y:14,width:7,height:7}),e('rect',{x:3,y:14,width:7,height:7}))},
    {id:'planner',label:'Planner',svg:()=>e('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'},e('rect',{x:3,y:4,width:18,height:18,rx:2}),e('line',{x1:16,y1:2,x2:16,y2:6}),e('line',{x1:8,y1:2,x2:8,y2:6}),e('line',{x1:3,y1:10,x2:21,y2:10}))},
    {id:'_add'},
    {id:'goals',label:'Goals',svg:()=>e('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'},e('circle',{cx:12,cy:12,r:10}),e('circle',{cx:12,cy:12,r:6}),e('circle',{cx:12,cy:12,r:2}))},
    {id:'log',label:'Log',svg:()=>e('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'},e('path',{d:'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'}),e('polyline',{points:'14 2 14 8 20 8'}),e('line',{x1:16,y1:13,x2:8,y2:13}),e('line',{x1:16,y1:17,x2:8,y2:17}))}
  ];

  const appShell=e('div',{className:'shell'},
    offline&&e('div',{className:'offbanner'},'⚡ Offline — changes saved locally'),
    e('div',{className:'page'},
      tab==='dashboard'&&e('div',null,
        e('div',{style:{display:'flex',justifyContent:'flex-end',marginBottom:-10}},
          e('button',{className:'ni',style:{flex:'none',width:36,height:36,borderRadius:'50%',background:'var(--s2)',border:'1px solid var(--bdr)',overflow:'hidden',padding:0},onClick:()=>setTab('profile')},
            DB.g('profile_photo')
              ?e('img',{src:DB.g('profile_photo'),style:{width:36,height:36,objectFit:'cover',borderRadius:'50%',display:'block'}})
              :e('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round',width:18,height:18},e('circle',{cx:12,cy:8,r:4}),e('path',{d:'M4 20c0-4 3.6-7 8-7s8 3 8 7'}))
          )
        ),
        e(Dashboard,{data})
      ),
      tab==='planner'&&e(Planner,{data,onDel:delItem}),
      tab==='goals'&&e(Goals,{data}),
      tab==='log'&&e(LogHistory,{data,onDel:delItem}),
      tab==='profile'&&e(Profile,{user,onLogout:logout,data,onPaydays:updPaydays,darkMode,onToggleDark:()=>setDarkMode(p=>!p)})
    ),
    e('nav',{className:'nav'},
      navDefs.map((item)=>{
        if(item.id==='_add')return e('button',{key:'add',className:'ni nadd',onClick:()=>setShowAdd(true)},
          e('svg',{viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round',width:22,height:22},e('line',{x1:12,y1:5,x2:12,y2:19}),e('line',{x1:5,y1:12,x2:19,y2:12}))
        );
        return e('button',{key:item.id,className:'ni '+(tab===item.id?'on':''),onClick:()=>setTab(item.id)},
          e(item.svg),
          e('span',{className:'nl'},item.label)
        );
      })
    ),
    showAdd&&e(AddModal,{onClose:()=>setShowAdd(false),onAdd:addItem})
  );

  return e(SessionGuard,{onLogout:logout},appShell);
}

const e=React.createElement;
ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
</script>
</body>
</html>
