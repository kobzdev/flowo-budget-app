<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0a0f1e"/>
<meta name="description" content="MyBudget — Personal Budget Tracker"/>
<title>MyBudget — Budget Tracker</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MyBudget"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* ── THEME ── */
[data-theme="dark"]{--bg:#0a0f1e;--s1:#111827;--s2:#1a2234;--s3:#232d42;--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--bdr:rgba(255,255,255,0.07)}
[data-theme="light"]{--bg:#f0f4f8;--s1:#ffffff;--s2:#f1f5f9;--s3:#e2e8f0;--t1:#0f172a;--t2:#475569;--t3:#94a3b8;--bdr:rgba(0,0,0,0.08)}
:root{--acc:#6ee7b7;--acc2:#38bdf8;--acc3:#f472b6;--acc4:#fbbf24;--red:#f87171;--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .25s,color .25s}
#root{min-height:100vh}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 60% 0%,#1a2e4a,#0a0f1e 60%)}
.logo{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.logo span{color:var(--acc)}
.tagline{color:#94a3b8;font-size:14px;margin-bottom:36px;text-align:center}
.auth-card{background:#111827;border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 4px 32px rgba(0,0,0,0.4)}
.tabs{display:flex;gap:4px;background:#1a2234;border-radius:var(--rs);padding:4px;margin-bottom:24px}
.tab{flex:1;text-align:center;padding:9px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#94a3b8;transition:all .2s;border:none;background:none;font-family:'DM Sans',sans-serif}
.tab.on{background:#232d42;color:#f1f5f9}

/* FORM */
.fg{margin-bottom:14px}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.inp{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);padding:12px 14px;color:var(--t1);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--t3)}
select.inp{appearance:none}
.btn{width:100%;background:var(--acc);color:#0a0f1e;border:none;border-radius:var(--rs);padding:13px;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s,transform .1s}
.btn:hover{opacity:.9}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--bdr);color:var(--t2);font-family:'DM Sans',sans-serif}
.btn-ghost:hover{background:var(--s2)}
.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--red);border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:14px}
.ok{background:rgba(110,231,183,.08);border:1px solid rgba(110,231,183,.2);color:var(--acc);border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:14px}

/* LAYOUT */
.shell{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto}
.page{flex:1;padding:20px 16px 100px;overflow-y:auto}

/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--s1);border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-around;padding:10px 2px 20px;z-index:100;transition:background .25s}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 6px;border-radius:12px;transition:all .2s;border:none;background:none;color:var(--t3);flex:1;font-family:'DM Sans',sans-serif}
.ni.on{color:var(--acc)}
.ni svg{width:20px;height:20px}
.nl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.nadd{background:var(--acc);color:#0a0f1e!important;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;margin-top:-12px;box-shadow:0 4px 20px rgba(110,231,183,.35);flex:0 0 50px;border:3px solid var(--bg)}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;margin-bottom:12px;transition:background .25s}
.card-sm{padding:14px 16px}
.hero{background:linear-gradient(135deg,#0d2640,#0a1f2e 60%,#091a24);border:1px solid rgba(110,231,183,.12);border-radius:20px;padding:24px 20px;margin-bottom:12px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(110,231,183,.07),transparent 70%);pointer-events:none}
.hlbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.5);font-weight:600;margin-bottom:5px}
.hamt{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;color:var(--acc);letter-spacing:-2px;line-height:1;margin-bottom:2px}
.hsub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:18px}
.hrow{display:flex;gap:8px}
.hstat{flex:1;background:rgba(255,255,255,.05);border-radius:var(--rs);padding:10px}
.hsl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.4);font-weight:600;margin-bottom:2px}
.hsv{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#fff}

/* SECTION */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.st{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t2)}
.sa{font-size:12px;color:var(--acc);font-weight:600;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif}

/* TRANSACTIONS */
.tx{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr)}
.tx:last-child{border-bottom:none}
.txi{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.txn{flex:1;min-width:0}
.txname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txmeta{font-size:12px;color:var(--t2);margin-top:1px}
.txamt{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;flex-shrink:0}
.inc{color:var(--acc)}.exp{color:var(--red)}
.txdel{background:none;border:none;color:var(--t3);cursor:pointer;padding:4px;font-size:15px;flex-shrink:0;transition:color .15s}
.txdel:hover{color:var(--red)}

/* CHART */
.ch{position:relative;height:190px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s}
.drw{background:var(--s1);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px 20px 44px;max-height:92vh;overflow-y:auto;animation:su .25s ease-out}
.hdl{width:40px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 18px}
.ov-center{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;animation:fi .2s}
.modal-box{background:var(--s1);border:1px solid var(--bdr);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;animation:pop .2s ease-out}
.modal-box-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px}
.modal-box-desc{font-size:14px;color:var(--t2);margin-bottom:18px;line-height:1.5}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--bdr);background:var(--s2);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.chip.on{background:var(--acc);border-color:var(--acc);color:#0a0f1e;font-weight:700}

/* TOGGLE */
.trow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bdr)}
.trow:last-child{border-bottom:none}
.tlbl{font-size:14px;color:var(--t1)}
.tog{width:44px;height:26px;background:var(--s3);border-radius:13px;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.tog.on{background:var(--acc)}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog.on::after{left:21px}

/* SEGMENT */
.seg{display:flex;gap:4px;background:var(--s2);border-radius:10px;padding:4px;margin-bottom:14px}
.sb{flex:1;text-align:center;padding:8px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);transition:all .15s;border:none;background:none;font-family:'DM Sans',sans-serif}
.sb.on{background:var(--s3);color:var(--t1)}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.bg{background:rgba(110,231,183,.12);color:var(--acc)}
.br{background:rgba(248,113,113,.12);color:var(--red)}
.bb{background:rgba(56,189,248,.12);color:var(--acc2)}
.by{background:rgba(251,191,36,.12);color:var(--acc4)}

/* PROGRESS */
.pbar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:8px}
.pfill{height:100%;border-radius:3px;transition:width .6s ease}

/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.ptitle{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}

/* EMPTY */
.empty{text-align:center;padding:32px 20px;color:var(--t2)}
.eico{font-size:36px;margin-bottom:10px}
.etxt{font-size:14px;line-height:1.6}

/* PROFILE AVATAR */
.pav-wrap{position:relative;width:90px;margin:0 auto 14px;cursor:pointer}
.pav{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden;border:3px solid var(--bdr)}
.pav img{width:90px;height:90px;object-fit:cover;display:block;border-radius:50%}
.pav-edit{position:absolute;bottom:2px;right:2px;width:28px;height:28px;border-radius:50%;background:var(--acc);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;pointer-events:none}
.pav-remove{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--red);cursor:pointer;padding:3px 8px;border-radius:20px;border:none;background:rgba(248,113,113,.08);font-family:'DM Sans',sans-serif}
.pname{text-align:center;font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.pemail{text-align:center;color:var(--t2);font-size:13px;margin-bottom:24px}
.mi{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--bdr);cursor:pointer}
.mi:last-child{border-bottom:none}
.mic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.mit{flex:1;font-size:14px;font-weight:500}
.mia{color:var(--t3);font-size:18px}

/* GOALS */
.goal-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:10px}
.goal-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.goal-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.goal-info{flex:1;min-width:0}
.goal-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.goal-meta{font-size:12px;color:var(--t2);margin-top:2px}
.goal-amounts{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-top:6px}
.goal-amounts span:last-child{color:var(--t1);font-weight:600}

/* INSIGHTS */
.insight{background:linear-gradient(135deg,#0d1f3c,#0f1a2e);border:1px solid rgba(56,189,248,.15);border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
[data-theme="light"] .insight{background:linear-gradient(135deg,#e8f4fd,#f0faff);border-color:rgba(56,189,248,.25)}
.insight-ico{font-size:22px;flex-shrink:0;margin-top:1px}
.insight-title{font-size:13px;font-weight:700;margin-bottom:2px;color:var(--acc2)}
.insight-txt{font-size:13px;color:var(--t2);line-height:1.5}

/* LOG */
.filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.filter-row::-webkit-scrollbar{display:none}
.fcip{padding:7px 14px;border-radius:20px;border:1px solid var(--bdr);background:var(--s2);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'DM Sans',sans-serif;flex-shrink:0}
.fcip.on{background:var(--acc);border-color:var(--acc);color:#0a0f1e;font-weight:700}
.dg-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);padding:10px 0 5px}

/* PIN */
.pin-dots{display:flex;gap:12px;justify-content:center;margin:14px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--t3);transition:all .15s}
.pin-dot.filled{background:var(--acc);border-color:var(--acc)}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto}
.pin-key{background:var(--s2);border:1px solid var(--bdr);border-radius:14px;padding:15px;font-family:'Syne',sans-serif;font-size:20px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;color:var(--t1)}
.pin-key:active{transform:scale(.93);background:var(--s3)}
.pin-key.del{font-size:16px;color:var(--t2)}

/* SESSION */
.session-banner{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fi .2s}
.session-card{background:var(--s1);border:1px solid rgba(110,231,183,.2);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;text-align:center}
.session-ico{font-size:40px;margin-bottom:12px}
.session-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px}
.session-sub{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.5}

/* IDLE WARNING */
.idle-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;animation:fi .3s}
.idle-box{background:var(--s1);border:1px solid var(--bdr);border-radius:24px;padding:32px 28px;width:100%;max-width:340px;text-align:center;animation:pop .25s ease-out}
.idle-count{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--red);line-height:1;margin-bottom:4px}
.idle-lbl{font-size:12px;color:var(--t3);margin-bottom:20px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.idle-bar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-bottom:22px}
.idle-fill{height:100%;background:var(--red);border-radius:3px;transition:width 1s linear}

/* MISC */
.col2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stitle{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:10px;padding:0 2px}
.days-big{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--acc2);line-height:1}
.days-lbl{font-size:13px;color:var(--t2);font-weight:500}
.offbanner{background:rgba(251,191,36,.08);border-bottom:1px solid rgba(251,191,36,.15);color:var(--acc4);padding:7px 16px;font-size:12px;font-weight:600;text-align:center}
.cachebanner{background:rgba(56,189,248,.06);border-bottom:1px solid rgba(56,189,248,.12);color:var(--acc2);padding:7px 16px;font-size:12px;font-weight:600;text-align:center}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(10,15,30,.3);border-top-color:#0a0f1e;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
.loading-logo{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;letter-spacing:-1px;margin-bottom:20px}
.loading-logo span{color:var(--acc)}
.loading-dot{display:flex;gap:8px}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef, useMemo } = React;
const e = React.createElement;

// ── CREDENTIALS ───────────────────────────────────────────────────
const SUPA_URL = 'https://zgljrbxvcwpxsllejauz.supabase.co';
const SUPA_KEY = 'sb_publishable_wRgbnh9IKH04VYCOlP2cxQ_HYxje0oh';

// ── SUPABASE CLIENT ───────────────────────────────────────────────
const supa = {
  // Standard headers for auth endpoints
  authHeaders: () => ({
    'Content-Type': 'application/json',
    'apikey': SUPA_KEY
  }),
  // Headers for REST/data endpoints — need the user JWT
  dataHeaders: (token) => ({
    'Content-Type': 'application/json',
    'apikey': SUPA_KEY,
    'Authorization': `Bearer ${token}`
  }),

  signUp: async (email, password) => {
    try {
      const r = await fetch(`${SUPA_URL}/auth/v1/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPA_KEY },
        body: JSON.stringify({ email, password })
      });
      const data = await r.json();
      return data;
    } catch(e) {
      console.error('SignUp error:', e);
      throw e;
    }
  },

  signIn: async (email, password) => {
    try {
      const r = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPA_KEY },
        body: JSON.stringify({ email, password })
      });
      const data = await r.json();
      return data;
    } catch(e) {
      console.error('SignIn error:', e);
      throw e;
    }
  },

  signOut: async (token) => {
    try {
      await fetch(`${SUPA_URL}/auth/v1/logout`, {
        method: 'POST',
        headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}` }
      });
    } catch {}
  },

  getUser: async (token) => {
    try {
      const r = await fetch(`${SUPA_URL}/auth/v1/user`, {
        headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}` }
      });
      return r.json();
    } catch { return {}; }
  },

  // Fetch only rows belonging to the logged-in user (user_id filter)
  select: async (table, token, uid) => {
    try {
      const filter = uid ? `&user_id=eq.${uid}` : '';
      const r = await fetch(`${SUPA_URL}/rest/v1/${table}?select=*&order=created_at.desc${filter}`, {
        headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
      });
      if (!r.ok) {
        const err = await r.json();
        console.error(`Select ${table} error:`, err);
        return null;
      }
      return r.json();
    } catch(e) { console.error('Select error:', e); return null; }
  },

  insert: async (table, data, token) => {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify(data)
    });
    if (!r.ok) {
      const err = await r.json();
      console.error('Insert error:', err);
      throw new Error(err.message || err.hint || 'Insert failed');
    }
    const rows = await r.json();
    return rows[0];
  },

  delete: async (table, id, token) => {
    await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}` }
    });
  },

  // Delete ALL rows for this user in a table
  deleteAll: async (table, uid, token) => {
    await fetch(`${SUPA_URL}/rest/v1/${table}?user_id=eq.${uid}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}` }
    });
  },

  upsertProfile: async (userId, payload, token) => {
    const r = await fetch(`${SUPA_URL}/rest/v1/profiles`, {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({ id: userId, ...payload })
    });
    if (!r.ok) { const err = await r.json(); console.error('Upsert profile error:', err); }
  },

  getProfile: async (userId, token) => {
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/profiles?id=eq.${userId}&select=*`, {
        headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${token}` }
      });
      if (!r.ok) return null;
      const rows = await r.json();
      return rows[0] || null;
    } catch { return null; }
  },

  // Send password reset email
  resetPassword: async (email) => {
    try {
      const r = await fetch(`${SUPA_URL}/auth/v1/recover`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPA_KEY
        },
        body: JSON.stringify({ email })
      });
      let data = null;
      try { data = await r.json(); } catch {}
      return { ok: r.status >= 200 && r.status < 300, status: r.status, data };
    } catch(e) {
      return { ok: false, networkError: true };
    }
  },

  // Update password using the recovery token from the reset email link
  updatePassword: async (newPassword, accessToken) => {
    try {
      const r = await fetch(`${SUPA_URL}/auth/v1/user`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPA_KEY,
          'Authorization': `Bearer ${accessToken}`
        },
        body: JSON.stringify({ password: newPassword })
      });
      const data = await r.json();
      return { ok: r.ok, data };
    } catch(e) {
      console.error('Update password error:', e);
      return { ok: false };
    }
  }
};

function nextPayday(paydays) {
  if (!paydays || !paydays.length) return { days: 0, date: null };
  const now = new Date(), m = now.getMonth(), y = now.getFullYear();
  let best = null, bd = 9999;
  for (const pd of paydays) {
    let d = new Date(y, m, pd);
    if (d <= now) d = new Date(y, m + 1, pd);
    const diff = Math.ceil((d - now) / 864e5);
    if (diff < bd) { bd = diff; best = d; }
  }
  return { days: bd, date: best };
}

// ── INSIGHTS ENGINE ───────────────────────────────────────────────
function getInsights(data) {
  const { income, expenses, planned, paydays } = data;
  const now = new Date();
  const thisMonth = expenses.filter(e => { const d = new Date(e.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
  const totInc  = income.reduce((s,i) => s+parseFloat(i.amount||0), 0);
  const totExp  = expenses.reduce((s,e) => s+parseFloat(e.amount||0), 0);
  const totPlan = planned.reduce((s,p) => s+parseFloat(p.amount||0), 0);
  const rem = totInc - totExp - totPlan;
  const { days } = nextPayday(paydays);
  const daily = days > 0 ? rem / days : 0;
  const catTot = {}; thisMonth.forEach(e => { catTot[e.category]=(catTot[e.category]||0)+parseFloat(e.amount||0); });
  const topCat = Object.entries(catTot).sort((a,b) => b[1]-a[1])[0];
  const out = [];
  const savRate = totInc > 0 ? ((totInc-totExp)/totInc)*100 : 0;
  if (savRate >= 20) out.push({ icon:'🎉', title:'Great Savings Rate!', text:`You're saving ${savRate.toFixed(0)}% of your income — above the recommended 20%. Keep it up!` });
  else if (savRate > 0 && totInc > 0) out.push({ icon:'💡', title:'Boost Your Savings', text:`You're saving ${savRate.toFixed(0)}% right now. Try cutting one expense to reach 20%.` });
  if (topCat) out.push({ icon:'🔍', title:`Top Spend: ${topCat[0]}`, text:`${fmt(topCat[1])} on ${topCat[0]} this month. ${topCat[1]>totInc*0.3?'That\'s over 30% of income!':'Watch this category.'}` });
  if (daily > 0) out.push({ icon:'📅', title:'Daily Budget', text:`You can safely spend ${fmt(daily)}/day until payday in ${days} days.` });
  if (rem < 0) out.push({ icon:'🚨', title:'Over Budget!', text:`You're ${fmt(Math.abs(rem))} over budget. Consider deferring non-essential expenses.` });
  const urgentBills = planned.filter(p => Math.ceil((new Date(p.due_date)-now)/864e5) <= 7);
  if (urgentBills.length > 0) out.push({ icon:'⚠️', title:'Bills Due Soon', text:`${urgentBills.length} bill${urgentBills.length>1?'s':''} due within 7 days: ${fmt(urgentBills.reduce((s,p)=>s+parseFloat(p.amount||0),0))} total.` });
  if (out.length === 0) out.push({ icon:'✨', title:'All Good!', text:'Add transactions to unlock personalised spending insights here.' });
  return out;
}

// ── PIN MODAL ─────────────────────────────────────────────────────
// mode: 'set' | 'verify' | 'reset'
function PinModal({ onSuccess, onCancel, mode }) {
  const initStep = mode==='set'?'enter':mode==='reset'?'verify-old':'verify';
  const [pin, setPin]         = useState('');
  const [confirm, setConfirm] = useState('');
  const [step, setStep]       = useState(initStep);
  const [err, setErr]         = useState('');

  const STEPS = {
    'verify':     { title:'Enter your PIN',      desc:'Enter your PIN to continue.' },
    'verify-old': { title:'Enter current PIN',   desc:'Step 1 of 2 — confirm your existing PIN first.' },
    'enter':      { title: mode==='reset'?'Set new PIN':'Create a PIN', desc: mode==='reset'?'Step 2 of 2 — choose your new 4-digit PIN.':'Choose a 4-digit PIN.' },
    'confirm':    { title:'Confirm new PIN',     desc:'Enter the same PIN again to confirm.' }
  };
  const { title, desc } = STEPS[step] || {};

  const handleKey = k => {
    if (step === 'verify') {
      const np = pin+k; if (np.length > 4) return; setPin(np);
      if (np.length === 4) {
        const saved = prefs.g('clear_pin');
        if (np === saved) setTimeout(() => onSuccess(), 120);
        else setTimeout(() => { setPin(''); setErr('Incorrect PIN. Try again.'); }, 300);
      }
    } else if (step === 'verify-old') {
      const np = pin+k; if (np.length > 4) return; setPin(np);
      if (np.length === 4) {
        const saved = prefs.g('clear_pin');
        if (np === saved) setTimeout(() => { setPin(''); setErr(''); setStep('enter'); }, 200);
        else setTimeout(() => { setPin(''); setErr('Incorrect PIN. Try again.'); }, 300);
      }
    } else if (step === 'enter') {
      const np = pin+k; if (np.length > 4) return; setPin(np);
      if (np.length === 4) setTimeout(() => setStep('confirm'), 150);
    } else if (step === 'confirm') {
      const np = confirm+k; if (np.length > 4) return; setConfirm(np);
      if (np.length === 4) {
        if (np === pin) { prefs.s('clear_pin', pin); setTimeout(() => onSuccess(), 120); }
        else setTimeout(() => { setConfirm(''); setErr('PINs do not match. Try again.'); setStep('enter'); setPin(''); }, 300);
      }
    }
  };

  const del = () => {
    if ((step==='verify'||step==='verify-old'||step==='enter') && pin.length > 0) setPin(p => p.slice(0,-1));
    else if (step === 'confirm' && confirm.length > 0) setConfirm(p => p.slice(0,-1));
  };

  const current = step === 'confirm' ? confirm : pin;

  return e('div', { className:'ov-center' },
    e('div', { className:'modal-box' },
      e('div', { className:'modal-box-title' }, title),
      e('div', { className:'modal-box-desc' }, desc),
      mode==='reset' && e('div', { style:{display:'flex',gap:6,justifyContent:'center',marginBottom:12} },
        [0,1].map(i => e('div', { key:i, style:{ height:4, width:40, borderRadius:2, background:(step==='verify-old'&&i===0)||(step!=='verify-old'&&i===1)?'var(--acc)':'var(--s3)', transition:'background .3s' }}))
      ),
      err && e('div', { className:'err', style:{marginBottom:10} }, err),
      e('div', { className:'pin-dots' },
        [0,1,2,3].map(i => e('div', { key:i, className:'pin-dot '+(i<current.length?'filled':'') }))
      ),
      e('div', { className:'pin-keypad' },
        ['1','2','3','4','5','6','7','8','9','','0','del'].map((k,i) => {
          if (k==='') return e('div', { key:i });
          return e('button', { key:i, className:'pin-key '+(k==='del'?'del':''), onClick:()=>k==='del'?del():handleKey(k) }, k==='del'?'⌫':k);
        })
      ),
      e('button', { className:'btn btn-ghost', style:{marginTop:16}, onClick:onCancel }, 'Cancel')
    )
  );
}

// ── IDLE GUARD (5-min session timeout) ───────────────────────────
const IDLE_MS   = 5 * 60 * 1000;
const WARN_SECS = 60;

function IdleGuard({ onLogout, children }) {
  const [warning, setWarning]   = useState(false);
  const [countdown, setCountdown] = useState(WARN_SECS);
  const idleTimer = useRef(null);
  const warnTimer = useRef(null);

  const resetIdle = () => {
    if (warning) return;
    clearTimeout(idleTimer.current);
    idleTimer.current = setTimeout(() => { setWarning(true); setCountdown(WARN_SECS); }, IDLE_MS);
  };

  useEffect(() => {
    const events = ['mousemove','mousedown','keydown','touchstart','touchmove','scroll','click'];
    events.forEach(ev => window.addEventListener(ev, resetIdle, { passive: true }));
    resetIdle();
    return () => {
      events.forEach(ev => window.removeEventListener(ev, resetIdle));
      clearTimeout(idleTimer.current);
      clearInterval(warnTimer.current);
    };
  }, [warning]);

  useEffect(() => {
    if (!warning) return;
    clearInterval(warnTimer.current);
    warnTimer.current = setInterval(() => {
      setCountdown(c => {
        if (c <= 1) { clearInterval(warnTimer.current); onLogout(); return 0; }
        return c - 1;
      });
    }, 1000);
    return () => clearInterval(warnTimer.current);
  }, [warning]);

  const stayActive = () => {
    setWarning(false);
    clearInterval(warnTimer.current);
    clearTimeout(idleTimer.current);
    idleTimer.current = setTimeout(() => { setWarning(true); setCountdown(WARN_SECS); }, IDLE_MS);
  };

  const pct = (countdown / WARN_SECS) * 100;

  return e('div', null,
    children,
    warning && e('div', { className:'idle-overlay' },
      e('div', { className:'idle-box' },
        e('div', { style:{fontSize:40,marginBottom:12} }, '⏱️'),
        e('div', { style:{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:700,marginBottom:8} }, 'Still there?'),
        e('div', { className:'idle-count' }, countdown),
        e('div', { className:'idle-lbl' }, 'seconds before sign-out'),
        e('div', { className:'idle-bar' }, e('div', { className:'idle-fill', style:{width:pct+'%'} })),
        e('div', { style:{fontSize:13,color:'var(--t2)',marginBottom:20,lineHeight:1.5} }, 'You\'ve been inactive for 5 minutes.'),
        e('button', { className:'btn', onClick:stayActive }, 'Yes, keep me signed in'),
        e('button', { className:'btn btn-ghost', style:{marginTop:10}, onClick:onLogout }, 'Sign out now')
      )
    )
  );
}

// ── AUTH SCREEN ───────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  // tab: 'login' | 'signup' | 'forgot'
  const [tab, setTab]     = useState('login');
  const [em, setEm]       = useState('');
  const [pw, setPw]       = useState('');
  const [pw2, setPw2]     = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr]     = useState('');
  const [ok, setOk]       = useState('');

  const switchTab = t => { setTab(t); setErr(''); setOk(''); };

  // ── Forgot password send ──
  const sendReset = async () => {
    if (!em.trim()) { setErr('Please enter your email address first.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em.trim())) { setErr('Please enter a valid email address.'); return; }
    setLoading(true); setErr(''); setOk('');
    const result = await supa.resetPassword(em.trim());
    setLoading(false);
    if (result.networkError) {
      setErr('Network error — please check your internet connection and try again.');
      return;
    }
    if (result.ok) {
      // Success — Supabase accepts the request regardless of whether email exists
      setOk('📧 Reset link sent! Check your email inbox (and spam folder) for a password reset link.');
    } else {
      // Show the actual Supabase error message so it's clear what went wrong
      const msg = result.data?.message || result.data?.error_description || result.data?.error || '';
      const status = result.status;
      console.warn('Reset email failed:', status, msg);
      if (status === 400 || status === 422) {
        setErr('Invalid email address. Please check and try again.');
      } else if (status === 429) {
        setErr('Too many attempts. Please wait a few minutes before trying again.');
      } else if (msg) {
        setErr(`Could not send reset email: ${msg}`);
      } else {
        setErr(`Request failed (status ${status}). Please try again or contact support.`);
      }
    }
  };

  const validate = () => {
    if (!em.trim()) return 'Please enter your email address.';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em.trim())) return 'Please enter a valid email address.';
    if (!pw) return 'Please enter your password.';
    if (pw.length < 6) return 'Password must be at least 6 characters.';
    if (tab === 'signup' && pw !== pw2) return 'Passwords do not match.';
    return null;
  };

  const go = async () => {
    const vErr = validate();
    if (vErr) { setErr(vErr); return; }
    setLoading(true); setErr(''); setOk('');
    try {
      if (tab === 'signup') {
        const d = await supa.signUp(em.trim(), pw);

        // Any error field means failure
        if (d.error || d.error_code || d.msg || d.code === 422 || d.code === 400) {
          const msg = (d.error_description || d.msg || d.error || '').toLowerCase();
          if (msg.includes('signups not allowed') || msg.includes('signup is disabled')) {
            setErr('Sign ups are currently disabled. Please contact the app owner to enable them in Supabase.');
          } else if (msg.includes('already registered') || msg.includes('already exists') || msg.includes('user already')) {
            setErr('This email is already registered. Please sign in instead.');
          } else if (msg.includes('invalid email')) {
            setErr('Please enter a valid email address.');
          } else if (msg.includes('rate limit') || msg.includes('email rate')) {
            setErr('Too many attempts. Please wait a few minutes and try again.');
          } else if (msg.includes('password') && msg.includes('weak')) {
            setErr('Password is too weak. Please use at least 6 characters.');
          } else {
            setErr(d.error_description || d.msg || d.error || 'Sign up failed. Please try again.');
          }
        }
        // Success with session (email confirmation disabled in Supabase)
        else if (d.access_token && d.user) {
          session.save(d.access_token, d.user, d.expires_in || 3600);
          onAuth(d.access_token, d.user);
        }
        // Success but needs email confirmation — user object returned without token
        else if (d.user && d.user.id) {
          setOk('✅ Account created! You can now sign in.');
          switchTab('login');
        }
        // Supabase v2 format: user at top level with id
        else if (d.id && d.email) {
          setOk('✅ Account created! You can now sign in.');
          switchTab('login');
        }
        // Unexpected response
        else {
          console.warn('Unexpected signup response:', d);
          setOk('✅ Account created! You can now sign in.');
          switchTab('login');
        }

      } else {
        // ── SIGN IN ──
        const d = await supa.signIn(em.trim(), pw);

        if (d.access_token && d.user) {
          session.save(d.access_token, d.user, d.expires_in || 3600);
          onAuth(d.access_token, d.user);
        } else if (d.error || d.error_description || d.error_code) {
          const msg = (d.error_description || d.error || '').toLowerCase();
          if (msg.includes('invalid login') || msg.includes('invalid credentials') || msg.includes('wrong password') || msg.includes('invalid email or password')) {
            setErr('Incorrect email or password. Please try again.');
          } else if (msg.includes('email not confirmed')) {
            setErr('Incorrect email or password. Please try again.');
          } else if (msg.includes('user not found') || msg.includes('no user found')) {
            setErr('No account found with this email. Please sign up first.');
          } else if (msg.includes('too many requests') || msg.includes('rate limit') || msg.includes('email rate')) {
            setErr('Too many attempts. Please wait a few minutes and try again.');
          } else if (msg.includes('signups not allowed') || msg.includes('signup is disabled')) {
            setErr('Account creation is currently disabled. Please contact the app owner.');
          } else {
            setErr(d.error_description || d.error || 'Sign in failed. Please check your email and password.');
          }
        } else {
          console.warn('Unexpected signin response:', d);
          setErr('Login failed. Please check your credentials and try again.');
        }
      }
    } catch(ex) {
      console.error('Auth error:', ex);
      setErr('Network error. Please check your internet connection and try again.');

// ── DASHBOARD ─────────────────────────────────────────────────────
function Dashboard({ data, onGoProfile }) {
  const { income, expenses, planned, paydays } = data;
  // viewMode: 'current' = this month only | 'range' = pick month
  const [viewMode, setViewMode] = useState('current');
  const [rangeMonth, setRangeMonth] = useState(() => {
    const n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');
  });
  const pieRef = useRef(null), barRef = useRef(null);
  const pieChart = useRef(null), barChart = useRef(null);

  const now = new Date();
  const curY = now.getFullYear(), curM = now.getMonth();

  // Parse selected range month
  const [selY, selM] = viewMode==='range'
    ? [parseInt(rangeMonth.split('-')[0]), parseInt(rangeMonth.split('-')[1])-1]
    : [curY, curM];

  // Filter helpers
  const inMonth = (dateStr, y, m) => {
    const d = new Date(dateStr); return d.getFullYear()===y && d.getMonth()===m;
  };

  const mIncome  = income.filter(i  => inMonth(i.date, selY, selM));
  const mExpenses= expenses.filter(e => inMonth(e.date, selY, selM));
  const mPlanned = planned.filter(p  => inMonth(p.due_date, selY, selM));

  const totInc  = mIncome.reduce((s,i)  => s+parseFloat(i.amount||0), 0);
  const totExp  = mExpenses.reduce((s,e) => s+parseFloat(e.amount||0), 0);
  const totPlan = mPlanned.reduce((s,p)  => s+parseFloat(p.amount||0), 0);
  const rem     = totInc - totExp - totPlan;

  const { days } = nextPayday(paydays);
  const daily = (viewMode==='current' && days>0) ? rem/days : 0;

  // Category breakdown for selected month
  const catTot = {};
  mExpenses.forEach(e => { catTot[e.category]=(catTot[e.category]||0)+parseFloat(e.amount||0); });

  // Yearly summary: each month's income vs expenses
  const yearMonths = Array.from({length:12}, (_,i) => {
    const label = new Date(curY,i,1).toLocaleDateString('en-PH',{month:'short'});
    const inc = income.filter(x=>inMonth(x.date,curY,i)).reduce((s,x)=>s+parseFloat(x.amount||0),0);
    const exp = expenses.filter(x=>inMonth(x.date,curY,i)).reduce((s,x)=>s+parseFloat(x.amount||0),0);
    const pln = planned.filter(x=>inMonth(x.due_date,curY,i)).reduce((s,x)=>s+parseFloat(x.amount||0),0);
    return { label, inc, exp, pln };
  });
  const yearTotInc = yearMonths.reduce((s,m)=>s+m.inc,0);
  const yearTotExp = yearMonths.reduce((s,m)=>s+m.exp,0);
  const yearTotPln = yearMonths.reduce((s,m)=>s+m.pln,0);

  const monthName = new Date(selY,selM,1).toLocaleDateString('en-PH',{month:'long',year:'numeric'});
  const isCurrentMonth = selY===curY && selM===curM;

  // Pie chart
  useEffect(() => {
    if (!pieRef.current) return;
    pieChart.current?.destroy();
    const cats = Object.keys(catTot);
    if (!cats.length) return;
    pieChart.current = new Chart(pieRef.current, {
      type: 'doughnut',
      data: { labels:cats, datasets:[{ data:cats.map(c=>catTot[c]), backgroundColor:cats.map(c=>CAT[c]?.c||'#94a3b8'), borderWidth:0, hoverOffset:4 }] },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ color:'#94a3b8', font:{size:11,family:'DM Sans'}, boxWidth:9, padding:10 }}}, cutout:'65%' }
    });
    return () => pieChart.current?.destroy();
  }, [JSON.stringify(catTot)]);

  // Yearly bar chart
  useEffect(() => {
    if (!barRef.current) return;
    barChart.current?.destroy();
    const labels = yearMonths.map(m=>m.label);
    barChart.current = new Chart(barRef.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label:'Income',   data:yearMonths.map(m=>m.inc), backgroundColor:'rgba(110,231,183,.7)', borderRadius:4 },
          { label:'Expenses', data:yearMonths.map(m=>m.exp), backgroundColor:'rgba(248,113,113,.7)', borderRadius:4 },
          { label:'Planned',  data:yearMonths.map(m=>m.pln), backgroundColor:'rgba(251,191,36,.5)',  borderRadius:4 }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'bottom', labels:{ color:'#94a3b8', font:{size:10,family:'DM Sans'}, boxWidth:10, padding:8 }}},
        scales:{
          x:{ grid:{display:false}, ticks:{color:'#475569',font:{size:10}} },
          y:{ grid:{color:'rgba(128,128,128,.08)'}, ticks:{color:'#475569',font:{size:10},callback:v=>'₱'+v} }
        }
      }
    });
    return () => barChart.current?.destroy();
  }, [JSON.stringify(yearMonths)]);

  const insights = getInsights({...data, income:mIncome, expenses:mExpenses, planned:mPlanned});
  const photo    = prefs.g('profile_photo');
  const dispName = prefs.g('profile_name');

  return e('div', null,
    // Header
    e('div', { className:'ph' },
      e('div', { className:'logo', style:{fontSize:24} }, 'My', e('span', null, 'Budget')),
      e('button', { style:{background:'none',border:'1px solid var(--bdr)',borderRadius:'50%',width:36,height:36,cursor:'pointer',overflow:'hidden',padding:0,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}, onClick:onGoProfile },
        photo
          ? e('img', { src:photo, style:{width:36,height:36,objectFit:'cover',borderRadius:'50%',display:'block'} })
          : e('span', { style:{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:14,color:'var(--acc)'} }, (dispName||'U').charAt(0).toUpperCase())
      )
    ),

    // View mode toggle
    e('div', { className:'seg', style:{marginBottom:14} },
      e('button', { className:'sb '+(viewMode==='current'?'on':''), onClick:()=>setViewMode('current') }, '📅 This Month'),
      e('button', { className:'sb '+(viewMode==='range'?'on':''),   onClick:()=>setViewMode('range')   }, '🗓 Browse Months')
    ),

    // Range month picker
    viewMode==='range' && e('div', { className:'card card-sm', style:{marginBottom:12,display:'flex',alignItems:'center',gap:12} },
      e('span', { style:{fontSize:13,color:'var(--t2)',flexShrink:0} }, 'Viewing:'),
      e('input', { className:'inp', type:'month', value:rangeMonth,
        onChange:ev=>setRangeMonth(ev.target.value),
        style:{flex:1,padding:'8px 12px'}
      }),
      !isCurrentMonth && e('span', { className:'bdg bb' }, monthName)
    ),

    // Hero balance — current month only
    e('div', { className:'hero' },
      e('div', { className:'hlbl' }, isCurrentMonth?'Available Balance — '+monthName:'Balance for '+monthName),
      e('div', { className:'hamt', style:{color:rem>=0?'var(--acc)':'var(--red)'} }, fmt(rem)),
      e('div', { className:'hsub' },
        isCurrentMonth && days>0 ? days+' days until payday · Daily: '+fmt(daily)
        : isCurrentMonth ? 'Set your payday in Profile'
        : (totInc===0&&totExp===0&&totPlan===0 ? 'No transactions this month' : monthName+' summary')
      ),
      e('div', { className:'hrow' },
        e('div', { className:'hstat' }, e('div',{className:'hsl'},'Income'),  e('div',{className:'hsv',style:{color:'var(--acc)'}},fmt(totInc))),
        e('div', { className:'hstat' }, e('div',{className:'hsl'},'Spent'),   e('div',{className:'hsv',style:{color:'var(--red)'}},fmt(totExp))),
        e('div', { className:'hstat' }, e('div',{className:'hsl'},'Planned'), e('div',{className:'hsv',style:{color:'var(--acc4)'}},fmt(totPlan)))
      )
    ),

    // Insights
    e('div', { className:'sh' }, e('span', { className:'st' }, '💡 Insights')),
    insights.slice(0,2).map((ins,i) =>
      e('div', { key:i, className:'insight' },
        e('div', { className:'insight-ico' }, ins.icon),
        e('div', null, e('div',{className:'insight-title'},ins.title), e('div',{className:'insight-txt'},ins.text))
      )
    ),

    // Pie chart
    Object.keys(catTot).length > 0 && e('div', { className:'card', style:{marginBottom:12} },
      e('div', { className:'sh' }, e('span',{className:'st'},'Expenses by Category — '+monthName)),
      e('div', { className:'ch' }, e('canvas', { ref:pieRef }))
    ),

    // Yearly overview (replaces Recent)
    e('div', { className:'card', style:{marginBottom:12} },
      e('div', { className:'sh' },
        e('span', {className:'st'}, '📊 '+curY+' Yearly Overview')
      ),
      // Year totals summary
      e('div', { style:{display:'flex',gap:10,marginBottom:14} },
        e('div', { style:{flex:1,background:'var(--s2)',borderRadius:10,padding:'10px 12px'} },
          e('div',{style:{fontSize:10,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--t3)',fontWeight:700,marginBottom:3}},'Total Income'),
          e('div',{style:{fontFamily:'Syne,sans-serif',fontSize:15,fontWeight:700,color:'var(--acc)'}},fmt(yearTotInc))
        ),
        e('div', { style:{flex:1,background:'var(--s2)',borderRadius:10,padding:'10px 12px'} },
          e('div',{style:{fontSize:10,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--t3)',fontWeight:700,marginBottom:3}},'Total Spent'),
          e('div',{style:{fontFamily:'Syne,sans-serif',fontSize:15,fontWeight:700,color:'var(--red)'}},fmt(yearTotExp))
        ),
        e('div', { style:{flex:1,background:'var(--s2)',borderRadius:10,padding:'10px 12px'} },
          e('div',{style:{fontSize:10,textTransform:'uppercase',letterSpacing:'.5px',color:'var(--t3)',fontWeight:700,marginBottom:3}},'Net Saved'),
          e('div',{style:{fontFamily:'Syne,sans-serif',fontSize:15,fontWeight:700,color:(yearTotInc-yearTotExp)>=0?'var(--acc)':'var(--red)'}},fmt(yearTotInc-yearTotExp))
        )
      ),
      // Bar chart
      e('div', { className:'ch', style:{height:200} }, e('canvas', { ref:barRef }))
    )
  );
}

// ── PLANNER ───────────────────────────────────────────────────────
function Planner({ data, onDel, onAdd }) {
  const { income, expenses, planned } = data;
  const [planView, setPlanView] = useState('current');
  const [planMonth, setPlanMonth] = useState(() => {
    const n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');
  });

  const now = new Date();
  const curY = now.getFullYear(), curM = now.getMonth();
  const [selY, selM] = planView==='range'
    ? [parseInt(planMonth.split('-')[0]), parseInt(planMonth.split('-')[1])-1]
    : [curY, curM];

  const inMonth = (dateStr, y, m) => {
    const d = new Date(dateStr); return d.getFullYear()===y && d.getMonth()===m;
  };

  const mIncome  = income.filter(i  => inMonth(i.date, selY, selM));
  const mExpenses= expenses.filter(e => inMonth(e.date, selY, selM));
  const mPlanned = planned.filter(p  => inMonth(p.due_date, selY, selM));

  const totInc  = mIncome.reduce((s,i)  => s+parseFloat(i.amount||0), 0);
  const totExp  = mExpenses.reduce((s,e) => s+parseFloat(e.amount||0), 0);
  const totPlan = mPlanned.reduce((s,p)  => s+parseFloat(p.amount||0), 0);
  const rem     = totInc - totExp - totPlan;
  const sorted  = [...mPlanned].sort((a,b) => new Date(a.due_date)-new Date(b.due_date));
  const monthName = new Date(selY,selM,1).toLocaleDateString('en-PH',{month:'long',year:'numeric'});
  const [paying, setPaying] = useState(null); // id of bill being marked paid

  const markPaid = async (p) => {
    if (!window.confirm('Mark "' + p.name + '" as paid? This will add it to your expenses.')) return;
    setPaying(p.id);
    try {
      await onAdd('expenses', { amount: parseFloat(p.amount), category: 'Bills', notes: p.name, date: todayStr() });
      await onDel('planned', p.id);
    } catch(ex) { alert('Failed to mark as paid. Please try again.'); }
    setPaying(null);
  };

  return e('div', null,
    e('div', { className:'ph' },
      e('div',{className:'ptitle'},'Planner'),
      e('span',{className:'bdg bb'},mPlanned.length+' bills')
    ),
    // View toggle
    e('div', { className:'seg', style:{marginBottom:12} },
      e('button', { className:'sb '+(planView==='current'?'on':''), onClick:()=>setPlanView('current') }, '📅 This Month'),
      e('button', { className:'sb '+(planView==='range'?'on':''),   onClick:()=>setPlanView('range')   }, '🗓 Browse Months')
    ),
    planView==='range' && e('div', { className:'card card-sm', style:{marginBottom:12,display:'flex',alignItems:'center',gap:10} },
      e('span',{style:{fontSize:13,color:'var(--t2)',flexShrink:0}},'Month:'),
      e('input',{className:'inp',type:'month',value:planMonth,onChange:ev=>setPlanMonth(ev.target.value),style:{flex:1,padding:'8px 12px'}})
    ),
    e('div', { className:'card', style:{background:'linear-gradient(135deg,#0d1f3c,#0f1f30)',borderColor:'rgba(56,189,248,.12)',marginBottom:12} },
      e('div',{className:'hlbl'},'Balance for '+monthName),
      e('div',{style:{fontFamily:'Syne,sans-serif',fontSize:34,fontWeight:800,color:rem>=0?'var(--acc2)':'var(--red)',letterSpacing:'-1px',lineHeight:1,marginBottom:4}},fmt(rem)),
      e('div',{style:{fontSize:13,color:'rgba(255,255,255,.45)'}},
        'Income: '+fmt(totInc)+' · Expenses: '+fmt(totExp)+' · Planned: '+fmt(totPlan))
    ),
    sorted.length === 0
      ? e('div',{className:'card'},e('div',{className:'empty'},e('div',{className:'eico'},'📋'),e('div',{className:'etxt'},'No planned bills for '+monthName+'.\nTap + → Planned to add one.')))
      : e('div', { className:'card' },
          e('div',{className:'sh'},e('span',{className:'st'},'Bills for '+monthName)),
          sorted.map(p => {
            const dl = Math.ceil((new Date(p.due_date)-new Date())/864e5);
            const isPaying = paying === p.id;
            return e('div', { className:'tx', key:p.id, style:{opacity: isPaying ? 0.5 : 1, transition:'opacity .2s'} },
              e('div',{className:'txi',style:{background:'rgba(56,189,248,.1)'}},'📅'),
              e('div',{className:'txn'},
                e('div',{className:'txname'},p.name),
                e('div',{className:'txmeta'},fmtD(p.due_date)+' · '+(dl>0?dl+'d left':dl===0?'Due today':'Overdue'))
              ),
              e('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}},
                e('span',{className:'txamt exp'},fmt(p.amount)),
                e('span',{className:'bdg '+(dl<0?'br':dl<3?'br':dl<7?'by':'bb')},dl<0?'Overdue':dl===0?'Today':dl+'d')
              ),
              e('button',{
                className:'btn',
                style:{width:'auto',padding:'5px 10px',fontSize:12,background:'var(--acc)',color:'#0a0f1e',marginLeft:6},
                disabled: isPaying,
                onClick: () => markPaid(p)
              }, isPaying ? '…' : '✓ Paid'),
              e('button',{className:'txdel',style:{marginLeft:4},onClick:()=>onDel('planned',p.id)},'✕')
            );
          })
        ),
    e('div', { style:{marginTop:8} },
      e('div',{className:'sh'},e('span',{className:'st'},'Income — '+monthName)),
      e('div', { className:'card' },
        mIncome.length === 0
          ? e('div',{className:'empty'},e('div',{className:'eico'},'💵'),e('div',{className:'etxt'},'No income for '+monthName+'.\nTap + → Income to add.'))
          : mIncome.map(i => e('div',{className:'tx',key:i.id},
              e('div',{className:'txi',style:{background:'rgba(110,231,183,.1)'}},'💰'),
              e('div',{className:'txn'},e('div',{className:'txname'},i.source||'Income'),e('div',{className:'txmeta'},fmtD(i.date)+(i.recurring?' · Monthly':''))),
              e('span',{className:'txamt inc'},'+'+fmt(i.amount)),
              e('button',{className:'txdel',onClick:()=>onDel('income',i.id)},'✕')
            ))
      )
    )
  );
}

function AddModal({ onClose, onAdd }) {
  const [type, setType]     = useState('expense');
  const [amount, setAmount] = useState('');
  const [cat, setCat]       = useState('Food');
  const [source, setSource] = useState('');
  const [notes, setNotes]   = useState('');
  const [date, setDate]     = useState(todayStr());
  const [recur, setRecur]   = useState(false);
  const [pname, setPname]   = useState('');
  const [due, setDue]       = useState(todayStr());
  const [saving, setSaving] = useState(false);
  const [err, setErr]       = useState('');

  const save = async () => {
    const a = parseFloat(amount);
    if (!a || isNaN(a) || a <= 0) { setErr('Please enter a valid amount.'); return; }
    setSaving(true); setErr('');
    try {
      if (type==='expense')      await onAdd('expenses', { amount:a, category:cat, notes, date });
      else if (type==='income')  await onAdd('income',   { amount:a, source, date, recurring:recur });
      else                       await onAdd('planned',  { name:pname||'Planned', amount:a, due_date:due });
      onClose();
    } catch(ex) { setErr(ex.message || 'Failed to save. Please try again.'); }
    setSaving(false);
  };

  return e('div', { className:'ov', onClick:ev=>{if(ev.target===ev.currentTarget)onClose();} },
    e('div', { className:'drw' },
      e('div', { className:'hdl' }),
      e('div', { style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18} },
        e('div', { style:{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:700} }, 'Add Transaction'),
        e('button', { className:'btn btn-ghost', style:{width:'auto',padding:'7px 14px',fontSize:13}, onClick:onClose }, '✕ Cancel')
      ),
      e('div', { className:'seg' },
        ['expense','income','planned'].map(t => e('button',{key:t,className:'sb '+(type===t?'on':''),onClick:()=>{setType(t);setErr('');}},t.charAt(0).toUpperCase()+t.slice(1)))
      ),
      err && e('div', { className:'err' }, err),
      e('div', { className:'fg' },
        e('label',{className:'lbl'},'Amount'),
        e('input',{className:'inp',type:'number',inputMode:'decimal',placeholder:'0.00',value:amount,onChange:ev=>setAmount(ev.target.value),autoFocus:true})
      ),
      type==='expense' && e('div', null,
        e('div',{className:'fg'},
          e('label',{className:'lbl'},'Category'),
          e('div',{className:'chips'},CATS.map(c=>e('div',{key:c,className:'chip '+(cat===c?'on':''),onClick:()=>setCat(c)},CAT[c].e+' '+c)))
        ),

// ── GOALS ─────────────────────────────────────────────────────────
function Goals({ data }) {
  const [goals, setGoals]     = useState(() => {
    try { return JSON.parse(localStorage.getItem('flowo_goals')||'[]'); } catch { return []; }
  });
  const [showForm, setShowForm] = useState(false);
  const [name, setName]       = useState('');
  const [target, setTarget]   = useState('');
  const [saved, setSaved]     = useState('');
  const [icon, setIcon]       = useState('🏠');
  const [color, setColor]     = useState('#6ee7b7');
  const [editId, setEditId]   = useState(null);
  const [addAmt, setAddAmt]   = useState('');
  const [addGoalId, setAddGoalId] = useState(null);

  const saveGoals = list => { setGoals(list); localStorage.setItem('flowo_goals', JSON.stringify(list)); };

  const saveGoal = () => {
    if (!name || !target) return;
    const item = { name, target:parseFloat(target), saved:parseFloat(saved)||0, icon, color };
    const updated = editId ? goals.map(g => g.id===editId ? {...g,...item} : g) : [{ ...item, id:Date.now()+Math.random() }, ...goals];
    saveGoals(updated); setShowForm(false); setName(''); setTarget(''); setSaved(''); setEditId(null);
  };
  const delGoal = id => saveGoals(goals.filter(g => g.id!==id));
  const addSavings = () => {
    const a = parseFloat(addAmt);
    if (!a || isNaN(a)) return;
    saveGoals(goals.map(g => g.id===addGoalId ? {...g, saved:Math.min((g.saved||0)+a, g.target)} : g));
    setAddAmt(''); setAddGoalId(null);
  };
  const openEdit = g => { setName(g.name); setTarget(String(g.target)); setSaved(String(g.saved||0)); setIcon(g.icon); setColor(g.color); setEditId(g.id); setShowForm(true); };

  const totalTarget = goals.reduce((s,g) => s+g.target, 0);
  const totalSaved  = goals.reduce((s,g) => s+(g.saved||0), 0);

  return e('div', null,
    e('div',{className:'ph'},
      e('div',{className:'ptitle'},'Goals'),
      e('button',{className:'btn',style:{width:'auto',padding:'8px 14px',fontSize:13},onClick:()=>{setEditId(null);setName('');setTarget('');setSaved('');setShowForm(true)}},'+ New')
    ),
    goals.length > 0 && e('div',{className:'card',style:{background:'linear-gradient(135deg,#0d1f3c,#0f1a2e)',borderColor:'rgba(56,189,248,.15)',marginBottom:12}},
      e('div',{className:'hlbl'},'Total Progress'),
      e('div',{style:{fontFamily:'Syne,sans-serif',fontSize:28,fontWeight:800,color:'var(--acc2)',letterSpacing:'-1px',lineHeight:1,marginBottom:2}},fmt(totalSaved)+' / '+fmt(totalTarget)),
      e('div',{className:'pbar',style:{marginTop:10,height:8}},e('div',{className:'pfill',style:{width:Math.min((totalSaved/Math.max(totalTarget,1))*100,100)+'%',background:'linear-gradient(90deg,#38bdf8,#6ee7b7)'}}))
    ),
    goals.length === 0 && !showForm && e('div',{className:'card'},e('div',{className:'empty'},e('div',{className:'eico'},'🎯'),e('div',{className:'etxt'},'No savings goals yet.\nTap "New" to create one!'))),
    goals.map(g => {
      const pct = Math.min(((g.saved||0)/g.target)*100, 100);
      const done = pct >= 100;
      return e('div',{key:g.id,className:'goal-card'},
        e('div',{className:'goal-top'},
          e('div',{className:'goal-ico',style:{background:g.color+'20'}},g.icon),
          e('div',{className:'goal-info'},e('div',{className:'goal-name'},g.name+(done?' 🎉':'')),e('div',{className:'goal-meta'},done?'Goal Reached!':pct.toFixed(0)+'% complete')),
          e('div',{style:{display:'flex',gap:6}},
            !done && e('button',{className:'btn',style:{width:'auto',padding:'6px 10px',fontSize:12},onClick:()=>setAddGoalId(g.id===addGoalId?null:g.id)},'+'),
            e('button',{style:{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--t2)',padding:'4px'},onClick:()=>openEdit(g)},'✏️'),
            e('button',{style:{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--t3)',padding:'4px'},onClick:()=>delGoal(g.id)},'✕')
          )
        ),
        e('div',{className:'pbar'},e('div',{className:'pfill',style:{width:pct+'%',background:done?'linear-gradient(90deg,#6ee7b7,#38bdf8)':g.color}})),
        e('div',{className:'goal-amounts'},e('span',null,'Saved: '+fmt(g.saved||0)),e('span',null,'Goal: '+fmt(g.target))),
        addGoalId===g.id && e('div',{style:{marginTop:12,display:'flex',gap:8}},
          e('input',{className:'inp',type:'number',inputMode:'decimal',placeholder:'Amount to add…',value:addAmt,onChange:ev=>setAddAmt(ev.target.value),style:{flex:1}}),
          e('button',{className:'btn',style:{width:'auto',padding:'10px 14px'},onClick:addSavings},'Add'),
          e('button',{className:'btn btn-ghost',style:{width:'auto',padding:'10px 12px'},onClick:()=>setAddGoalId(null)},'✕')
        )
      );
    }),
    showForm && e('div',{className:'ov',onClick:ev=>{if(ev.target===ev.currentTarget)setShowForm(false)}},
      e('div',{className:'drw'},
        e('div',{className:'hdl'}),
        e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}},
          e('div',{style:{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:700}},editId?'Edit Goal':'New Goal'),
          e('button',{className:'btn btn-ghost',style:{width:'auto',padding:'7px 14px',fontSize:13},onClick:()=>setShowForm(false)},'✕ Cancel')
        ),
        e('div',{className:'fg'},e('label',{className:'lbl'},'Goal Name'),e('input',{className:'inp',placeholder:'e.g. Emergency Fund, Vacation',value:name,onChange:ev=>setName(ev.target.value),autoFocus:true})),
        e('div',{className:'col2'},
          e('div',{className:'fg'},e('label',{className:'lbl'},'Target (₱)'),e('input',{className:'inp',type:'number',inputMode:'decimal',placeholder:'5000',value:target,onChange:ev=>setTarget(ev.target.value)})),
          e('div',{className:'fg'},e('label',{className:'lbl'},'Already Saved (₱)'),e('input',{className:'inp',type:'number',inputMode:'decimal',placeholder:'0',value:saved,onChange:ev=>setSaved(ev.target.value)}))
        ),
        e('div',{className:'fg'},e('label',{className:'lbl'},'Icon'),e('div',{className:'chips'},GOAL_ICONS.map(ic=>e('div',{key:ic,className:'chip '+(icon===ic?'on':''),style:{fontSize:18,padding:'4px 10px'},onClick:()=>setIcon(ic)},ic)))),
        e('div',{className:'fg'},
          e('label',{className:'lbl'},'Color'),
          e('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},GOAL_COLORS.map(cl=>e('div',{key:cl,onClick:()=>setColor(cl),style:{width:28,height:28,borderRadius:'50%',background:cl,cursor:'pointer',border:color===cl?'3px solid var(--t1)':'3px solid transparent',transition:'border .15s'}})))

// ── LOG HISTORY ───────────────────────────────────────────────────
function LogHistory({ data, onDel }) {
  const { income, expenses } = data;
  const [catFilter, setCatFilter]   = useState('All');
  const [typeFilter, setTypeFilter] = useState('All');
  const [dateFrom, setDateFrom]     = useState('');
  const [dateTo, setDateTo]         = useState('');
  const [showFilters, setShowFilters] = useState(false);

  const all = useMemo(() => [
    ...expenses.map(ex => ({...ex, _type:'expense'})),
    ...income.map(i  => ({...i,  _type:'income', category:'Income', notes:i.source}))
  ].sort((a,b) => new Date(b.date)-new Date(a.date)), [expenses, income]);

  const filtered = useMemo(() => all.filter(tx => {
    if (typeFilter!=='All' && tx._type!==typeFilter.toLowerCase()) return false;
    if (catFilter!=='All'  && tx.category!==catFilter) return false;
    if (dateFrom && tx.date < dateFrom) return false;
    if (dateTo   && tx.date > dateTo)   return false;
    return true;
  }), [all, typeFilter, catFilter, dateFrom, dateTo]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(tx => { if (!g[tx.date]) g[tx.date]=[]; g[tx.date].push(tx); });
    return Object.entries(g).sort((a,b) => b[0].localeCompare(a[0]));
  }, [filtered]);

  const totalExp = filtered.filter(t=>t._type==='expense').reduce((s,t)=>s+parseFloat(t.amount||0),0);
  const totalInc = filtered.filter(t=>t._type==='income').reduce((s,t)=>s+parseFloat(t.amount||0),0);
  const hasFilters = catFilter!=='All'||typeFilter!=='All'||dateFrom||dateTo;

  return e('div', null,
    e('div',{className:'ph'},
      e('div',{className:'ptitle'},'History'),
      e('button',{className:'btn '+(hasFilters?'':'btn-ghost'),style:{width:'auto',padding:'8px 12px',fontSize:13},onClick:()=>setShowFilters(!showFilters)},(hasFilters?'● ':'')+'Filter')
    ),
    e('div',{className:'card card-sm',style:{marginBottom:12}},
      e('div',{style:{display:'flex',gap:20}},
        e('div',null,e('div',{style:{fontSize:11,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.5px',fontWeight:700,marginBottom:2}},'Income'),e('div',{style:{fontFamily:'Syne,sans-serif',fontSize:18,fontWeight:700,color:'var(--acc)'}},'+'+fmt(totalInc))),
        e('div',null,e('div',{style:{fontSize:11,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.5px',fontWeight:700,marginBottom:2}},'Expenses'),e('div',{style:{fontFamily:'Syne,sans-serif',fontSize:18,fontWeight:700,color:'var(--red)'}},'-'+fmt(totalExp))),
        e('div',null,e('div',{style:{fontSize:11,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.5px',fontWeight:700,marginBottom:2}},'Net'),e('div',{style:{fontFamily:'Syne,sans-serif',fontSize:18,fontWeight:700,color:(totalInc-totalExp)>=0?'var(--acc)':'var(--red)'}},fmt(totalInc-totalExp)))
      )
    ),
    showFilters && e('div',{className:'card card-sm',style:{marginBottom:12}},
      e('div',{className:'fg'},e('label',{className:'lbl'},'Type'),e('div',{className:'filter-row'},['All','Expense','Income'].map(t=>e('button',{key:t,className:'fcip '+(typeFilter===t?'on':''),onClick:()=>setTypeFilter(t)},t)))),
      e('div',{className:'fg'},e('label',{className:'lbl'},'Category'),e('div',{className:'filter-row'},['All',...CATS,'Income'].map(c=>e('button',{key:c,className:'fcip '+(catFilter===c?'on':''),onClick:()=>setCatFilter(c)},c)))),
      e('div',{className:'col2'},
        e('div',{className:'fg'},e('label',{className:'lbl'},'From'),e('input',{className:'inp',type:'date',value:dateFrom,onChange:ev=>setDateFrom(ev.target.value)})),
        e('div',{className:'fg'},e('label',{className:'lbl'},'To'),  e('input',{className:'inp',type:'date',value:dateTo,  onChange:ev=>setDateTo(ev.target.value)}))
      ),
      hasFilters && e('button',{className:'btn btn-ghost',style:{fontSize:13,padding:'9px'},onClick:()=>{setCatFilter('All');setTypeFilter('All');setDateFrom('');setDateTo('')}},'✕ Clear Filters')
    ),
    filtered.length === 0
      ? e('div',{className:'card'},e('div',{className:'empty'},e('div',{className:'eico'},'🔍'),e('div',{className:'etxt'},'No transactions match\nyour filters.')))
      : e('div',{className:'card'},
          grouped.map(([date,txs]) => e('div',{key:date},
            e('div',{className:'dg-lbl'},fmtFull(date)),
            txs.map(tx => {
              const isInc = tx._type==='income';
              const c = isInc ? {e:'💰',bg:'rgba(110,231,183,.1)'} : (CAT[tx.category]||CAT.Other);
              return e('div',{className:'tx',key:tx.id},
                e('div',{className:'txi',style:{background:c.bg}},c.e),
                e('div',{className:'txn'},e('div',{className:'txname'},tx.notes||tx.category),e('div',{className:'txmeta'},tx.category+(tx.recurring?' · Monthly':''))),
                e('span',{className:'txamt '+(isInc?'inc':'exp')},(isInc?'+':'-')+fmt(tx.amount)),
  
              );
            })
          ))
        )
  );
}


// ── CLEAR MANAGER ─────────────────────────────────────────────────
function ClearManager({ data, onClose, onDeleteAll, onDeleteOne }) {
  const TABS = [
    { key:'expenses', label:'Expenses', icon:'💸', count: data.expenses.length },
    { key:'income',   label:'Income',   icon:'💰', count: data.income.length   },
    { key:'planned',  label:'Bills',    icon:'📅', count: data.planned.length  }
  ];
  const [activeTab, setActiveTab] = useState('expenses');
  const [deleting, setDeleting]   = useState(null);

  const confirmDeleteAll = (types) => {
    const label = types.length === 3 ? 'ALL transactions' : types.join(', ');
    if (!window.confirm('Delete all ' + label + '? This cannot be undone.')) return;
    onDeleteAll(types);
  };

  const confirmDeleteOne = async (table, id) => {
    setDeleting(id);
    await onDeleteOne(table, id);
    setDeleting(null);
  };

  const activeRows = (activeTab === 'expenses' ? data.expenses : activeTab === 'income' ? data.income : data.planned) || [];

  return e('div', { className:'ov', onClick:ev=>{if(ev.target===ev.currentTarget)onClose();} },
    e('div', { className:'drw', style:{maxHeight:'90vh'} },
      e('div', { className:'hdl' }),
      e('div', { style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16} },
        e('div', { style:{fontFamily:'Syne,sans-serif',fontSize:20,fontWeight:700} }, '🗑️ Manage Transactions'),
        e('button', { className:'btn btn-ghost', style:{width:'auto',padding:'7px 14px',fontSize:13}, onClick:onClose }, '✕ Close')
      ),
      e('div', { className:'seg', style:{marginBottom:14} },
        TABS.map(t => e('button', {
          key: t.key,
          className: 'sb ' + (activeTab===t.key ? 'on' : ''),
          onClick: () => setActiveTab(t.key)
        }, t.icon + ' ' + t.label + ' (' + t.count + ')'))
      ),
      e('div', { style:{display:'flex',alignItems:'center',justifyContent:'space-between',background:'rgba(248,113,113,.08)',border:'1px solid rgba(248,113,113,.15)',borderRadius:10,padding:'10px 14px',marginBottom:14} },
        e('span', { style:{fontSize:13,color:'var(--t2)',fontWeight:500} },
          activeRows.length > 0 ? activeRows.length + ' record' + (activeRows.length!==1?'s':'') : 'No records'
        ),
        e('button', {
          className:'btn',
          style:{width:'auto',padding:'7px 14px',fontSize:13,background:'var(--red)',color:'#fff'},
          disabled: activeRows.length === 0,
          onClick: () => confirmDeleteAll([activeTab])
        }, 'Delete All')
      ),
      activeRows.length === 0
        ? e('div', { className:'empty', style:{padding:'28px 0'} },
            e('div', { className:'eico' }, '✅'),
            e('div', { className:'etxt' }, 'No ' + activeTab + ' to delete.')
          )
        : e('div', { className:'card', style:{maxHeight:340,overflowY:'auto',padding:'4px 16px'} },
            activeRows.map(item => {
              const isDel = deleting === item.id;
              let icon, bg, label, sub, amtColor, amtPrefix;
              if (activeTab === 'expenses') {
                const cat = CAT[item.category] || CAT.Other;
                icon = cat.e; bg = cat.bg;
                label = item.notes || item.category;
                sub = fmtD(item.date) + ' · ' + item.category;
                amtColor = 'var(--red)'; amtPrefix = '-';
              } else if (activeTab === 'income') {
                icon = '💰'; bg = 'rgba(110,231,183,.1)';
                label = item.source || 'Income';
                sub = fmtD(item.date) + (item.recurring ? ' · Monthly' : '');
                amtColor = 'var(--acc)'; amtPrefix = '+';
              } else {
                icon = '📅'; bg = 'rgba(56,189,248,.1)';
                label = item.name || 'Bill';
                sub = 'Due ' + fmtD(item.due_date);
                amtColor = 'var(--red)'; amtPrefix = '-';
              }
              return e('div', { key: item.id, className:'tx', style:{opacity: isDel ? 0.4 : 1, transition:'opacity .2s'} },
                e('div', { className:'txi', style:{background:bg} }, icon),
                e('div', { className:'txn' },
                  e('div', { className:'txname' }, label),
                  e('div', { className:'txmeta' }, sub)
                ),
                e('span', { className:'txamt', style:{color:amtColor, marginRight:8} }, amtPrefix + fmt(item.amount)),
                e('button', {
                  className:'txdel',
                  disabled: isDel,
                  style:{color:'var(--red)',fontSize:16},
                  onClick: () => confirmDeleteOne(activeTab, item.id)
                }, isDel ? '…' : '🗑')
              );
            })
          ),
      e('div', { style:{marginTop:16,paddingTop:14,borderTop:'1px solid var(--bdr)'} },
        e('button', {
          className:'btn',
          style:{background:'var(--red)',color:'#fff'},
          onClick: () => confirmDeleteAll(['income','expenses','planned'])
        }, 'Delete ALL Transactions')
      )
    )
  );
}

// ── PROFILE ───────────────────────────────────────────────────────
function Profile({ user, onLogout, data, onPaydays, darkMode, onToggleDark, onClearTransactions, onDelItem }) {
  const [paydays, setPaydays]       = useState(data.paydays||[]);
  const [nd, setNd]                 = useState('');
  const [pinModal, setPinModal]     = useState(null);
  const [photo, setPhoto]           = useState(() => prefs.g('profile_photo'));
  const [displayName, setDisplayName] = useState(() => prefs.g('profile_name')||'');
  const [editingName, setEditingName] = useState(false);
  const fileRef = useRef(null);
  const { days } = nextPayday(paydays);
  const hasPIN = !!prefs.g('clear_pin');

  const addPd = async () => {
    const d = parseInt(nd);
    if (isNaN(d)||d<1||d>31) return;
    const u = [...new Set([...paydays,d])].sort((a,b)=>a-b);
    setPaydays(u); await onPaydays(u); setNd('');
  };
  const remPd = async d => { const u=paydays.filter(p=>p!==d); setPaydays(u); await onPaydays(u); };

  const handlePhoto = ev => {
    const file = ev.target.files[0];
    if (!file) return;
    if (file.size > 5*1024*1024) { alert('Image too large. Please choose one under 5MB.'); return; }
    const reader = new FileReader();
    reader.onload = r => { const b64=r.target.result; setPhoto(b64); prefs.s('profile_photo',b64); };
    reader.readAsDataURL(file);
  };
  const removePhoto = () => { setPhoto(null); prefs.s('profile_photo',null); };
  const saveName    = () => { prefs.s('profile_name', displayName); setEditingName(false); };

    const mode = pinModal; // capture before clearing

  const doDeleteAll = (types) => {

    setShowClearManager(false);

  const init   = displayName ? displayName.charAt(0).toUpperCase() : (user?.email||'?').charAt(0).toUpperCase();

            e('input',{className:'inp',value:displayName,onChange:ev=>setDisplayName(ev.target.value),placeholder:'Your name',style:{maxWidth:200,textAlign:'center'},onKeyDown:ev=>{if(ev.key==='Enter')saveName();if(ev.key==='Escape')setEditingName(false);},autoFocus:true}),
            e('button',{className:'btn',style:{width:'auto',padding:'10px 14px'},onClick:saveName},'✓')
          )
        : e('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:6,margin:'10px 0 3px'},onClick:()=>setEditingName(true)},
            e('div',{className:'pname',style:{cursor:'pointer'}},shownName),

      e('div',{className:'pemail'},user?.email)

        e('div',{className:'mi',onClick:handleClearData},
